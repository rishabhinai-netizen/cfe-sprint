:["Capability","Rationalization","Greed","Collusion"],"a":1,"e":"Cressey's Fraud Triangle: <strong>pressure + opportunity + rationalization</strong>. Remove any leg and fraud becomes less likely. (Capability is the Fraud Diamond's added element.)"},"s3q2":{"sec":"s3","t":"Which model adds 'capability' to the Fraud Triangle?","o":["Fraud Scale","Fraud Diamond","Routine activity theory","Differential association"],"a":1,"e":"The <strong>Fraud Diamond</strong> adds <em>capability</em> — the individual's position, skills, and confidence to commit and conceal the fraud."},"s3q3":{"sec":"s3","t":"Sutherland's definition of white-collar crime emphasizes crime committed by:","o":["Organized criminal gangs","A person of respectability and high status in the course of their occupation","Only corporations","Government officials only"],"a":1,"e":"Edwin Sutherland defined <strong>white-collar crime</strong> as crime committed by a person of respectability and high social status in the course of their occupation."},"s3q4":{"sec":"s3","t":"According to ACFE research, the most common method by which occupational fraud is initially detected is:","o":["External audit","Tips","By accident","Law enforcement"],"a":1,"e":"<strong>Tips</strong> are consistently the #1 detection method, which is why reporting hotlines are among the most effective anti-fraud controls."},"s3q5":{"sec":"s3","t":"Primary responsibility for designing and maintaining internal controls rests with:","o":["External auditors","Management","The internal audit team only","Regulators"],"a":1,"e":"<strong>Management</strong> owns the design and operation of internal controls and is primarily responsible for preventing and detecting fraud. Auditors provide assurance, not the controls."},"s3q6":{"sec":"s3","t":"Which governance body most directly oversees financial reporting, internal control, and the external auditor?","o":["The marketing committee","The audit committee","The works council","The pension trustees"],"a":1,"e":"The <strong>audit committee</strong> (ideally independent directors) oversees financial reporting integrity, internal controls, and the external auditor relationship."},"s3q7":{"sec":"s3","t":"'Tone at the top' refers to:","o":["The volume of management meetings","The ethical climate set by leadership's example and messaging","The number of internal controls","Executive compensation levels"],"a":1,"e":"<strong>Tone at the top</strong> is the ethical climate established by leadership. A weak tone is the strongest cultural fraud-risk factor."},"s3q8":{"sec":"s3","t":"How many components are in the COSO Internal Control–Integrated Framework?","o":["Three","Four","Five","Seven"],"a":2,"e":"COSO has <strong>five</strong> components: control environment, risk assessment, control activities, information & communication, and monitoring activities."},"s3q9":{"sec":"s3","t":"Which is the foundational component of the COSO framework?","o":["Monitoring","Control environment","Control activities","Risk assessment"],"a":1,"e":"The <strong>control environment</strong> (integrity, ethical values, tone at the top, governance) is the foundation on which the other components rest."},"s3q10":{"sec":"s3","t":"Separating authorization, recording, and custody of assets is the control known as:","o":["Reconciliation","Segregation of duties","Monitoring","Risk assessment"],"a":1,"e":"<strong>Segregation of duties</strong> divides authorization, recording, and custody so no one person controls a whole transaction. Its absence is the most-cited control weakness."},"s3q11":{"sec":"s3","t":"An unqualified ('clean') external audit opinion means:","o":["No fraud exists in the company","Reasonable—not absolute—assurance the statements are free of material misstatement","All transactions were tested","Management is exonerated"],"a":1,"e":"An audit provides <strong>reasonable, not absolute, assurance</strong>. A clean opinion is not a guarantee that no fraud exists — a classic exam distractor."},"s3q12":{"sec":"s3","t":"In a fraud risk assessment, inherent risk is assessed:","o":["After considering controls","Before considering mitigating controls","Only for IT systems","Only by external auditors"],"a":1,"e":"Assess <strong>inherent risk first</strong> (before controls), then factor in mitigating controls to determine <strong>residual</strong> risk. Likelihood × significance drives prioritization."},"s3q13":{"sec":"s3","t":"A fraud risk assessment should be:","o":["A one-time annual checkbox","A periodic, ongoing process responsive to business changes","Performed only after a fraud occurs","Limited to the finance department"],"a":1,"e":"FRA is <strong>periodic and ongoing</strong>, updated as the business and risk environment change — not a single annual checkbox."},"s3q14":{"sec":"s3","t":"Managing vendor and customer fraud risk through due diligence and audit rights addresses:","o":["Internal payroll risk","Third-party fraud risk","Securities fraud","Tax avoidance"],"a":1,"e":"Due diligence, ongoing monitoring, and contractual audit rights manage <strong>third-party fraud risk</strong> — your VendorRecon/DMA-scoring territory."},"s3q15":{"sec":"s3","t":"Per ACFE research, which anti-fraud control is associated with faster detection and lower losses?","o":["Longer audit reports","A reporting hotline","Higher executive pay","More board meetings"],"a":1,"e":"<strong>Reporting hotlines</strong> are linked to faster detection and lower losses because tips are the leading detection method."},"s3q16":{"sec":"s3","t":"Under the ACFE Code of Professional Ethics, a CFE shall:","o":["Express an opinion on legal guilt when confident","Never express an opinion on the legal guilt or innocence of any person","Always testify for the prosecution","Keep all findings secret from the client"],"a":1,"e":"A core CFE Code duty: <strong>never express an opinion on the legal guilt or innocence</strong> of any person. Offer findings within expertise only."},"s3q17":{"sec":"s3","t":"The CFE Code requires that any opinion rendered be supported by:","o":["The client's preference","A reasonable evidential basis","Majority vote","The examiner's intuition"],"a":1,"e":"A CFE must obtain evidence providing a <strong>reasonable basis</strong> for any opinion. Unsupported or speculative opinions violate the Code."},"s3q18":{"sec":"s3","t":"Which statement about legality and ethics is correct?","o":["Anything legal is automatically ethical","An action can be legal yet still unethical","Ethics and law are identical","Only illegal acts are unethical"],"a":1,"e":"<strong>Legal does not always mean ethical.</strong> Fraud examiners must distinguish morality, ethics, and legality and apply professional ethical standards beyond the legal minimum."},"s1n1":{"sec":"s1","t":"Priya, an accounts-receivable clerk, steals a $4,000 check from Customer A. When Customer B pays $4,000 two weeks later, she posts B’s payment to A’s account, then covers B with Customer C. Which scheme and concealment is this?","o":["Cash larceny concealed by a forced balance","Skimming concealed by lapping","A billing scheme concealed by a shell company","Register disbursement concealed by a false void"],"a":1,"e":"The receivable was stolen before being fully accounted for and the shortfall is rolled customer-to-customer — the textbook signature of <strong>skimming concealed by lapping</strong>. A forced balance relates to register/cash counts, not receivables rolling."},"s1n2":{"sec":"s1","t":"Which of the following is the BEST example of a fraudulent disbursement rather than skimming?","o":["A waiter fails to ring up a cash sale and keeps the money","A clerk pockets cash from a recorded sale, creating a drawer shortage","An employee sets up a fake vendor and approves its invoices for payment","A cashier voids a legitimate sale and keeps the cash before recording it"],"a":2,"e":"A <strong>fake-vendor (shell company) billing scheme</strong> is an on-book fraudulent disbursement — company funds leave through the AP system on false documentation. The cash-sale options are skimming (unrecorded) or larceny."},"s1n3":{"sec":"s1","t":"TRUE or FALSE: Because skimming occurs before the transaction is recorded, it generally leaves a clear audit trail in the victim’s books.","o":["True","False"],"a":1,"e":"<strong>False.</strong> Skimming is off-book — the sale or receipt is never recorded, so it leaves <em>no</em> direct audit trail. That absence of a record is exactly what makes it hard to detect."},"s1n4":{"sec":"s1","t":"A controller capitalizes routine repair costs as fixed assets to inflate current-year earnings. This MOST directly results in:","o":["Understated assets and overstated expenses","Overstated assets and overstated net income","Understated revenue and overstated liabilities","No effect on the financial statements"],"a":1,"e":"Capitalizing an expense moves it off the income statement onto the balance sheet — <strong>assets are overstated and net income is overstated</strong> because the expense was improperly deferred."},"s1n5":{"sec":"s1","t":"Which financial-statement fraud scheme is committed by failing to record warranty or litigation reserves?","o":["Fictitious revenue","Timing differences","Concealed liabilities and expenses","Improper asset valuation"],"a":2,"e":"Omitting required reserves (warranties, litigation, returns) understates obligations — a <strong>concealed liabilities and expenses</strong> scheme. The company looks more solvent and profitable than it is."},"s1n6":{"sec":"s1","t":"Ravi ships goods to a distributor near period-end that the distributor has the unconditional right to return, and books the full sale immediately to hit targets. This is BEST described as:","o":["Channel stuffing (timing/fictitious revenue)","An illegal gratuity","A pass-through scheme","Economic extortion"],"a":0,"e":"Pushing product into a channel near period-end to recognize revenue that may be returned is <strong>channel stuffing</strong> — an improper timing/premature-revenue scheme. Right-of-return undermines the ‘earned’ criterion."},"s1n7":{"sec":"s1","t":"All of the following are red flags of financial statement fraud EXCEPT:","o":["Revenue growing faster than cash flow from operations","Receivables growing faster than sales","A dominant CEO who overrides controls","Consistent dividends paid from stable, growing operating cash flow"],"a":3,"e":"Stable, growing operating cash flow funding dividends is a sign of <strong>health</strong>, not fraud. The other three (revenue outpacing cash, receivables outpacing sales, control override) are classic FSF red flags."},"s1n8":{"sec":"s1","t":"An employee buys a personal laptop and submits it on an expense report disguised as ‘client supplies.’ This is which type of expense-reimbursement scheme?","o":["Overstated expense","Mischaracterized expense","Fictitious expense","Duplicate reimbursement"],"a":1,"e":"A genuine purchase that is personal but reported as business is a <strong>mischaracterized expense</strong>. Overstated inflates a real business cost; fictitious invents one; duplicate claims the same cost twice."},"s1n9":{"sec":"s1","t":"Which control would MOST effectively detect a ghost-employee scheme?","o":["Requiring two signatures on the bank account","Periodically distributing paychecks in person and reconciling to HR records","Rotating the company’s external auditor","Encrypting the payroll database"],"a":1,"e":"<strong>In-person paycheck distribution reconciled to HR/active-employee records</strong> exposes ghosts — no real person claims the check. Signature controls and encryption don’t reveal a fictitious payee."},"s1n10":{"sec":"s1","t":"Vendor Sigma overbills ABC Ltd by $50,000 and returns $20,000 to the purchasing manager who approved it. The $20,000 is BEST classified as:","o":["A bribe","A kickback","An illegal gratuity","Economic extortion"],"a":1,"e":"A vendor returning part of an inflated payment to the employee who steered the business is a <strong>kickback</strong> — a form of bribery tied to overbilling/contract steering."},"s1n11":{"sec":"s1","t":"The KEY element that distinguishes bribery from an illegal gratuity is:","o":["The dollar value of the payment","Whether intent existed to influence a decision before it was made","Whether the recipient is a government official","Whether the payment was in cash"],"a":1,"e":"<strong>Bribery requires intent to influence a decision (a quid pro quo before the act); an illegal gratuity rewards a decision already made</strong> with no prior agreement to influence. Value and form are irrelevant to the distinction."},"s1n12":{"sec":"s1","t":"Three competing vendors agree in advance who will submit the lowest bid on each upcoming contract, taking turns. This is:","o":["Bid rotation","Complementary bidding","Bid suppression","Market division by territory"],"a":0,"e":"Taking turns being the designated low bidder is <strong>bid rotation</strong>. Complementary (cover) bids are deliberately high to create an illusion of competition; suppression is agreeing not to bid."},"s1n13":{"sec":"s1","t":"In the ICICI HFC context, a borrower obtains a loan in his gardener’s name but takes the proceeds and makes the payments himself. This is a:","o":["Double-pledged collateral scheme","Nominee (straw borrower) loan","Construction draw fraud","Reciprocal loan arrangement"],"a":1,"e":"A loan booked in a straw borrower’s name for the true party’s benefit is a <strong>nominee/straw-borrower loan</strong>, often used to evade exposure limits or hide the real risk."},"s1n14":{"sec":"s1","t":"An appraiser, paid by the loan officer, values a property at ₹1.2 crore when comparable sales support ₹70 lakh, enabling a larger mortgage. The PRIMARY scheme is:","o":["Air loan","Appraisal (valuation) fraud","Property flipping by the borrower","Account takeover"],"a":1,"e":"Inflating the valuation to justify a larger loan is <strong>appraisal fraud</strong> — directly your ValuGuard domain. An air loan involves a wholly nonexistent property or borrower."},"s1n15":{"sec":"s1","t":"TRUE or FALSE: Under most AML regimes, structuring deposits to stay below a reporting threshold is itself a violation even if the underlying cash is from a legal source.","o":["True","False"],"a":0,"e":"<strong>True.</strong> Structuring (deliberately breaking deposits to evade reporting) is an offense in its own right regardless of the funds’ origin, because the intent is to defeat the reporting requirement."},"s1n16":{"sec":"s1","t":"A customer deposits large cash sums, immediately wires them to several offshore shell companies, which then route funds back to buy local real estate. The offshore wiring stage corresponds to:","o":["Placement","Layering","Integration","Smurfing"],"a":1,"e":"Moving funds through shells and cross-border wires to obscure their origin is <strong>layering</strong>. The initial cash deposit is placement; buying the real estate at the end is integration."},"s1n17":{"sec":"s1","t":"Which body issues the 40 Recommendations that serve as the global AML/CFT standard?","o":["The Basel Committee","The Financial Action Task Force (FATF)","The Egmont Group","IOSCO"],"a":1,"e":"<strong>FATF</strong> issues the 40 Recommendations. The Basel Committee handles prudential banking standards; the Egmont Group links national Financial Intelligence Units."},"s1n18":{"sec":"s1","t":"Mr. Khan writes checks between his accounts at two different banks to exploit clearing delays and create the illusion of funds. This is:","o":["Lapping","Check kiting","Structuring","Synthetic identity fraud"],"a":1,"e":"Exploiting the <strong>float</strong> between banks by passing checks against insufficient funds is <strong>check kiting</strong>."},"s1n19":{"sec":"s1","t":"A fraudster combines a real (stolen) Social Security/PAN number with a fabricated name and date of birth to open new credit. This is:","o":["Account takeover","Synthetic identity theft","True-name financial identity theft","Pretexting"],"a":1,"e":"Blending real and fabricated identifiers to create a new, fictitious identity is <strong>synthetic identity theft</strong> — distinct from account takeover (hijacking an existing account)."},"s1n20":{"sec":"s1","t":"An attacker emails an AP clerk posing as the CEO, urgently requesting a wire to a ‘new vendor account.’ This is MOST precisely:","o":["Ransomware","Business email compromise (BEC)","A pyramid scheme","Check kiting"],"a":1,"e":"Impersonating an executive by email to redirect a payment is <strong>business email compromise (BEC)</strong> — emphasized heavily in the 2026 cyberfraud blueprint."},"s1n21":{"sec":"s1","t":"An investment operator pays “returns” to early investors entirely out of money contributed by newer investors, with no real underlying profits. This is a:","o":["Pyramid scheme","Ponzi scheme","Pump-and-dump","Advance-fee scheme"],"a":1,"e":"Paying earlier investors from later investors’ funds with no genuine returns is a <strong>Ponzi scheme</strong>. A pyramid derives income chiefly from recruitment of new participants."},"s1n22":{"sec":"s1","t":"Which statement BEST captures the tax line that the CFE Exam tests?","o":["Avoidance and evasion are both illegal","Evasion is the legal minimization of tax; avoidance is illegal","Evasion is illegal and requires willful intent; avoidance is lawful","Only corporations can commit evasion"],"a":2,"e":"<strong>Tax evasion is illegal and requires willful intent</strong> to defeat tax; <strong>tax avoidance is the lawful</strong> arrangement of affairs to minimize tax. The willfulness/legality line is the tested point."},"s1n23":{"sec":"s1","t":"During a physical inventory count, an employee stacks empty cartons to disguise missing goods. This concealment is called:","o":["Forced balance","Physical padding","Shrinkage netting","Channel stuffing"],"a":1,"e":"Faking quantity-on-hand with empty containers during a count is <strong>physical padding</strong> of inventory."},"s1n24":{"sec":"s1","t":"Which occupational-fraud category typically shows the HIGHEST median loss despite the LOWEST frequency?","o":["Asset misappropriation","Corruption","Financial statement fraud","Expense reimbursement fraud"],"a":2,"e":"<strong>Financial statement fraud</strong> is rarest but most costly per case. Asset misappropriation is the inverse (most frequent, lowest median loss); corruption sits between."},"s1n25":{"sec":"s1","t":"A purchasing employee secretly owns the supplier she selects for a large contract and never discloses it. The PRIMARY issue is:","o":["Bribery","An undisclosed conflict of interest","Economic extortion","Bid suppression"],"a":1,"e":"An undisclosed personal/economic interest in a transaction the employee influences is a <strong>conflict of interest</strong>. Disclosure is the dividing line; the harm flows from divided loyalty."},"s1n26":{"sec":"s1","t":"Which analysis would MOST directly reveal that cost of goods sold was manipulated relative to sales across three years?","o":["Vertical (common-size) analysis of the income statement","A bank reconciliation","A chain-of-custody log","A Gantt chart"],"a":0,"e":"<strong>Vertical/common-size analysis</strong> expresses each line as a % of sales, making an abnormal COGS-to-sales shift visible. Horizontal analysis would also help; the other options are unrelated."},"s1n27":{"sec":"s1","t":"A cashier processes a fictitious refund to a customer who doesn’t exist and removes the cash. Because the refund IS recorded, this is:","o":["Skimming","A register disbursement scheme","Cash larceny by forced balance","A billing scheme"],"a":1,"e":"A recorded false refund/void used to justify removing cash is a <strong>register disbursement</strong> scheme — the recorded transaction distinguishes it from skimming."},"s1n28":{"sec":"s1","t":"TRUE or FALSE: A pass-through (turnaround) billing scheme involves the employee’s shell delivering no goods at all.","o":["True","False"],"a":1,"e":"<strong>False.</strong> In a <strong>pass-through</strong>, the employee’s intermediary actually buys real goods, then resells them to the employer at an inflated markup. A pure <em>shell</em> scheme is the one that delivers nothing."},"s1n29":{"sec":"s1","t":"Under the U.S. Foreign Corrupt Practices Act (FCPA), which is prohibited?","o":["Paying foreign income tax","Bribing a foreign official to obtain or retain business","Hiring a local sales agent","Maintaining a foreign bank account"],"a":1,"e":"The FCPA prohibits <strong>bribing foreign officials</strong> to obtain or retain business and requires accurate books and records and adequate internal accounting controls."},"s1n30":{"sec":"s1","t":"Which set of numbers is MOST appropriate for a Benford’s Law test?","o":["Sequential invoice ID numbers","Employee badge numbers","Disbursement/payment dollar amounts","Telephone numbers"],"a":2,"e":"Benford’s Law applies to <strong>naturally occurring amounts</strong> such as payment/disbursement values. Assigned/sequential numbers (IDs, badges, phone numbers) do not follow Benford’s distribution."},"s2n1":{"sec":"s2","t":"An examiner begins testing a hypothesis, then revises it as new evidence emerges. Which step of the fraud theory approach is being applied?","o":["Analyzing available data","Creating a hypothesis","Testing the hypothesis","Refining and amending the hypothesis"],"a":3,"e":"Adjusting the working theory as facts develop is the <strong>refine/amend</strong> step. The full cycle: analyze data → create hypothesis → test → refine."},"s2n2":{"sec":"s2","t":"Which is the BEST statement of why a fraud examination differs from an audit?","o":["Examinations are recurring; audits are one-time","Examinations are allegation-specific and seek to resolve a particular issue; audits are general and recurring","Audits require predication; examinations do not","Only audits may be used in court"],"a":1,"e":"A <strong>fraud examination is specific and allegation-driven</strong> (inception to disposition), whereas an audit is recurring and general in scope. Examinations — not audits — require predication."},"s2n3":{"sec":"s2","t":"An anonymous tip alleges a manager is taking kickbacks, supported by unusual vendor patterns. A reasonable, trained professional would believe fraud may have occurred. This threshold is called:","o":["Probable cause","Predication","Materiality","Reasonable doubt"],"a":1,"e":"<strong>Predication</strong> is the totality of circumstances that would lead a reasonable, professionally trained person to believe a fraud has/ is/ will occur. No examination should begin without it."},"s2n4":{"sec":"s2","t":"In planning interview order for a suspected procurement fraud ring, the examiner should generally interview:","o":["The prime suspect first to get a confession quickly","Neutral and least-culpable witnesses first, moving toward the most culpable last","All parties simultaneously","Only the suspect"],"a":1,"e":"Move from <strong>least culpable to most culpable</strong> (and general to specific), so you reach the prime suspect last — armed with corroborated evidence."},"s2n5":{"sec":"s2","t":"Which combination correctly lists the four common-law elements of fraud?","o":["Intent, motive, opportunity, concealment","Material false statement, knowledge of falsity, reliance, damages","Predication, materiality, causation, remedy","Duty, breach, causation, harm"],"a":1,"e":"The four elements: a <strong>material false statement</strong>, <strong>knowledge of its falsity</strong>, victim <strong>reliance</strong>, and resulting <strong>damages</strong>."},"s2n6":{"sec":"s2","t":"A prosecutor must prove a criminal fraud charge to what standard?","o":["Preponderance of the evidence","Clear and convincing evidence","Beyond a reasonable doubt","Probable cause"],"a":2,"e":"Criminal matters require proof <strong>beyond a reasonable doubt</strong> — the highest burden. Civil fraud generally uses preponderance (‘more likely than not’)."},"s2n7":{"sec":"s2","t":"Rank the three burdens from LOWEST to HIGHEST.","o":["Beyond a reasonable doubt < clear and convincing < preponderance","Preponderance < clear and convincing < beyond a reasonable doubt","Clear and convincing < preponderance < beyond a reasonable doubt","Preponderance < beyond a reasonable doubt < clear and convincing"],"a":1,"e":"From lowest to highest: <strong>preponderance of the evidence → clear and convincing → beyond a reasonable doubt</strong>. This ladder is one of the most-tested Law items."},"s2n8":{"sec":"s2","t":"Which U.S. statute targets a ‘pattern of racketeering activity’ and offers both criminal and powerful civil remedies?","o":["Sarbanes-Oxley Act","RICO","The False Claims Act","The Securities Act of 1933"],"a":1,"e":"<strong>RICO</strong> (Racketeer Influenced and Corrupt Organizations Act) addresses a pattern of racketeering activity and provides criminal penalties and treble-damages civil actions."},"s2n9":{"sec":"s2","t":"Under the False Claims Act, a private whistleblower who sues on the government’s behalf brings what kind of action?","o":["A class action","A qui tam action","A derivative action","An interpleader"],"a":1,"e":"A <strong>qui tam</strong> action lets a private ‘relator’ sue for fraud against the government and share in any recovery — a hallmark of the False Claims Act."},"s2n10":{"sec":"s2","t":"TRUE or FALSE: In a private-sector internal investigation in the U.S., the employer must give Miranda warnings before interviewing an employee suspect.","o":["True","False"],"a":1,"e":"<strong>False.</strong> Miranda applies to <em>custodial interrogation by government</em>. Private employers are not required to give Miranda warnings, though employment law and policies still apply."},"s2n11":{"sec":"s2","t":"An eyewitness testifies she personally saw the defendant alter the ledger. This is:","o":["Circumstantial evidence","Direct evidence","Hearsay","Demonstrative evidence"],"a":1,"e":"Testimony of something <strong>personally perceived</strong> that proves a fact without inference is <strong>direct evidence</strong>. Circumstantial evidence requires an inference."},"s2n12":{"sec":"s2","t":"A chart the examiner prepares to help the jury visualize the flow of stolen funds is which type of evidence?","o":["Real evidence","Testimonial evidence","Demonstrative evidence","Documentary evidence"],"a":2,"e":"Illustrative aids (charts, diagrams, models) that explain other evidence are <strong>demonstrative evidence</strong>."},"s2n13":{"sec":"s2","t":"During seizure of a suspect laptop, the examiner should FIRST:","o":["Boot the original and browse for files","Create a verified forensic image and work only on the copy","Delete temporary files to save space","Email the hard drive contents to counsel"],"a":1,"e":"Always <strong>image the drive (with a write-blocker) and analyze the copy</strong>, never the original — preserving integrity and admissibility."},"s2n14":{"sec":"s2","t":"Why does an examiner compute and compare hash values when imaging digital media?","o":["To compress the data","To prove the image is identical to the original and unaltered","To encrypt the evidence","To recover the password"],"a":1,"e":"A matching <strong>hash (e.g., SHA-256)</strong> demonstrates the forensic image is bit-for-bit identical to the source and has not been altered — establishing integrity."},"s2n15":{"sec":"s2","t":"All of the following help preserve documentary evidence EXCEPT:","o":["Obtaining originals where possible","Maintaining an evidence/chain-of-custody log","Highlighting and annotating directly on the original document","Handling the document minimally to preserve forensic features"],"a":2,"e":"<strong>Writing on the original</strong> destroys its evidentiary integrity (alters the item, masks indented writing/forensic features). The other three are sound preservation practices."},"s2n16":{"sec":"s2","t":"Place these interview question types in their proper sequence: assessment, introductory, admission-seeking, informational, closing.","o":["Introductory → informational → closing → assessment → admission-seeking","Informational → introductory → assessment → closing → admission-seeking","Introductory → assessment → informational → admission-seeking → closing","Assessment → introductory → informational → closing → admission-seeking"],"a":0,"e":"Proper order: <strong>Introductory → Informational → Closing → Assessment → Admission-seeking</strong>. The last two are used only when warranted."},"s2n17":{"sec":"s2","t":"“You were in the vault on the night of the 4th, weren’t you?” is an example of which question type?","o":["Open question","Leading question","Assessment question","Introductory question"],"a":1,"e":"A question that suggests its own answer is a <strong>leading question</strong>, used mainly to confirm facts already known."},"s2n18":{"sec":"s2","t":"An admission-seeking interview is appropriate ONLY when:","o":["The subject asks for it","There is reasonable certainty of the subject’s guilt","No other witnesses are available","The auditor recommends it"],"a":1,"e":"Admission-seeking interviews require <strong>reasonable certainty of guilt</strong>, conducted privately by an interviewer of suitable standing. They are never the opening move."},"s2n19":{"sec":"s2","t":"In an admission-seeking interview, the examiner offers: “Did you take the money to cover your daughter’s medical bills, or was it just to keep up with expenses?” This technique is the:","o":["Benchmark admission","Alternative question","Direct accusation","Diffusing of alibis"],"a":1,"e":"Presenting two incriminating choices (one more face-saving) to move the subject toward admitting is the <strong>alternative question</strong>."},"s2n20":{"sec":"s2","t":"When a guilty subject begins to voice a denial during an admission-seeking interview, the skilled interviewer should:","o":["Allow the denial to be fully and firmly stated","Interrupt and delay the denial before it hardens","Immediately end the interview","Threaten prosecution"],"a":1,"e":"Interviewers <strong>interrupt denials</strong> before they entrench, because a firmly voiced denial is psychologically harder for the subject to later retract."},"s2n21":{"sec":"s2","t":"A signed confession statement should include all of the following EXCEPT:","o":["The approximate dates and amounts","An acknowledgment that it was made voluntarily","A promise by the examiner that the subject won’t be prosecuted","The subject’s own description of the act and intent"],"a":2,"e":"Examiners must <strong>never promise non-prosecution or leniency</strong> — it can void the confession and is beyond their authority. Valid statements use the subject’s own words, with dates, amounts, intent, and a voluntariness acknowledgment."},"s2n22":{"sec":"s2","t":"An examiner reconstructs a subject’s income by computing: increase in net worth + living expenses − funds from known legitimate sources. This is the:","o":["Bank deposits method","Net worth method","Percentage markup method","Source and application of funds ratio"],"a":1,"e":"That formula is the <strong>net worth method</strong> — the headline indirect tracing technique for inferring unreported/illicit income."},"s2n23":{"sec":"s2","t":"Under Benford’s Law, the leading digit 1 is expected approximately how often in a large set of natural numbers?","o":["About 11%","About 30%","About 5%","About 50%"],"a":1,"e":"Leading digit 1 appears about <strong>30.1%</strong> of the time, declining to ~4.6% for 9. Big departures from this curve can flag manipulation."},"s2n24":{"sec":"s2","t":"On cross-examination, a fraud examiner serving as an expert should:","o":["Advocate forcefully for the side that retained her","Offer an opinion on the defendant’s legal guilt","Stay within her expertise and concede points that are genuinely true","Refuse to answer difficult questions"],"a":2,"e":"An expert remains <strong>objective, stays within expertise, and concedes what is true</strong>. She must <em>not</em> opine on legal guilt/innocence or act as an advocate."},"s2n25":{"sec":"s2","t":"A fraud examination report should:","o":["State a legal conclusion that the suspect is guilty","Present facts and findings impartially, avoiding opinions on guilt","Omit any evidence favorable to the suspect","Use persuasive, emotionally charged language"],"a":1,"e":"Reports must be <strong>accurate, impartial, and fact-based</strong>, must not opine on guilt, and must not omit exculpatory evidence. They have to withstand scrutiny in court."},"s2n26":{"sec":"s2","t":"Civil and criminal proceedings arising from the same fraudulent conduct run at the same time. These are:","o":["Double jeopardy","Parallel proceedings","Class actions","Interlocutory appeals"],"a":1,"e":"<strong>Parallel proceedings</strong> require careful coordination (self-incrimination exposure, discovery conflicts, timing)."},"s2n27":{"sec":"s2","t":"To best preserve attorney-client privilege and work-product protection over an internal investigation, the examiner should:","o":["Publish interim findings to all staff","Conduct the work at the direction of legal counsel","Share working papers with the suspect","Avoid documenting anything"],"a":1,"e":"Running the investigation <strong>at the direction of counsel</strong> supports privilege and work-product claims over investigative materials."},"s2n28":{"sec":"s2","t":"TRUE or FALSE: Most fraud cases can be proven only with direct evidence; circumstantial evidence is generally inadmissible.","o":["True","False"],"a":1,"e":"<strong>False.</strong> Most fraud cases are built largely on <em>circumstantial</em> evidence, which is fully admissible. Fraud is usually concealed, so direct evidence is rare."},"s2n29":{"sec":"s2","t":"Which is a legitimate purpose of the introductory phase of an interview?","o":["Accusing the subject of the fraud","Establishing rapport and a basis for the interview, and seeking a commitment to cooperate","Obtaining a signed confession","Presenting the alternative question"],"a":1,"e":"The <strong>introductory</strong> phase establishes rapport, provides a reason for the interview, and secures cooperation — it does not accuse or seek admissions."},"s2n30":{"sec":"s2","t":"Before launching a covert operation, the examiner should FIRST:","o":["Notify the suspect","Commit the basis and objectives of the operation to a written memorandum","Promise immunity to informants","Skip predication to preserve secrecy"],"a":1,"e":"A covert operation must rest on <strong>adequate predication and a written memorandum</strong> stating its basis, expected information, and known suspects. Predication is never skipped."},"s3n1":{"sec":"s3","t":"Donald Cressey’s research produced which model, and what are its three legs?","o":["Fraud Diamond — pressure, opportunity, capability","Fraud Triangle — pressure, opportunity, rationalization","Fraud Scale — pressure, opportunity, integrity","Routine activity — offender, target, guardian"],"a":1,"e":"Cressey gave us the <strong>Fraud Triangle: pressure (a non-shareable financial problem) + opportunity + rationalization</strong>. It is the single most-tested concept on the exam."},"s3n2":{"sec":"s3","t":"Which element does the Fraud Diamond add to the Fraud Triangle?","o":["Greed","Capability","Collusion","Concealment"],"a":1,"e":"The <strong>Fraud Diamond adds capability</strong> — the individual’s position, skills, and confidence to commit and conceal the act."},"s3n3":{"sec":"s3","t":"Edwin Sutherland is credited with defining which concept?","o":["Occupational fraud","White-collar crime","The fraud triangle","Routine activity theory"],"a":1,"e":"Sutherland coined <strong>white-collar crime</strong>: crime committed by a person of respectability and high social status in the course of their occupation."},"s3n4":{"sec":"s3","t":"Per the ACFE’s Report to the Nations, occupational fraud is MOST often initially detected by:","o":["External audit","Tips","Management review","Law enforcement notification"],"a":1,"e":"<strong>Tips</strong> are consistently the leading detection method, which is why reporting hotlines rank among the most effective anti-fraud controls."},"s3n5":{"sec":"s3","t":"TRUE or FALSE: External auditors, not management, bear primary responsibility for designing and maintaining a company’s internal controls.","o":["True","False"],"a":1,"e":"<strong>False.</strong> <strong>Management</strong> owns the design and operation of internal controls and is primarily responsible for preventing and detecting fraud. Auditors provide assurance, not the controls."},"s3n6":{"sec":"s3","t":"Which governance body has direct oversight of financial reporting, internal control, and the relationship with the external auditor?","o":["The compensation committee","The audit committee","The nominating committee","The treasury function"],"a":1,"e":"The <strong>audit committee</strong> (ideally independent directors) oversees financial-reporting integrity, internal control, and the external auditor."},"s3n7":{"sec":"s3","t":"‘Tone at the top’ is BEST described as:","o":["The number of controls in place","The ethical climate set by leadership’s example and messaging","The frequency of audits","The size of the internal audit budget"],"a":1,"e":"<strong>Tone at the top</strong> is the ethical environment leadership models. A weak tone is the strongest cultural fraud-risk factor."},"s3n8":{"sec":"s3","t":"How many components comprise the COSO Internal Control–Integrated Framework, and which is the foundation?","o":["Five components; control activities is the foundation","Five components; the control environment is the foundation","Three components; monitoring is the foundation","Seven components; risk assessment is the foundation"],"a":1,"e":"COSO has <strong>five components</strong>, and the <strong>control environment</strong> (integrity, ethics, tone at the top, governance) is the foundation for the rest."},"s3n9":{"sec":"s3","t":"Which is NOT one of the five COSO components?","o":["Risk assessment","Control activities","Fraud prosecution","Monitoring activities"],"a":2,"e":"<strong>Fraud prosecution</strong> is not a COSO component. The five are: control environment, risk assessment, control activities, information & communication, and monitoring activities."},"s3n10":{"sec":"s3","t":"Separating authorization, recording, and custody of an asset among different people is which control?","o":["Reconciliation","Segregation of duties","Independent monitoring","Risk assessment"],"a":1,"e":"<strong>Segregation of duties</strong> splits authorization, recording, and custody so no single person controls an entire transaction. Its absence is the most-cited control weakness."},"s3n11":{"sec":"s3","t":"A surprise reconciliation that detects a fraud after it has occurred is which type of control?","o":["Preventive","Detective","Corrective","Compensating"],"a":1,"e":"A control that <strong>finds</strong> a problem after the fact (reconciliations, audits, exception reports) is a <strong>detective</strong> control. Preventive controls stop it before it happens."},"s3n12":{"sec":"s3","t":"TRUE or FALSE: An unqualified (‘clean’) audit opinion guarantees the financial statements contain no fraud.","o":["True","False"],"a":1,"e":"<strong>False.</strong> An audit provides <em>reasonable</em>, not absolute, assurance. A clean opinion is not a guarantee that no fraud exists — a classic distractor."},"s3n13":{"sec":"s3","t":"In a fraud risk assessment, the risk that exists BEFORE considering any mitigating controls is called:","o":["Residual risk","Inherent risk","Detection risk","Control risk"],"a":1,"e":"<strong>Inherent risk</strong> is assessed first (before controls); after applying mitigating controls you arrive at <strong>residual risk</strong>."},"s3n14":{"sec":"s3","t":"Which two dimensions are typically combined to prioritize identified fraud risks?","o":["Cost and revenue","Likelihood and significance (impact)","Frequency and seniority","Materiality and timing"],"a":1,"e":"Fraud risks are prioritized by <strong>likelihood × significance (impact)</strong>, focusing resources on the most probable and damaging schemes."},"s3n15":{"sec":"s3","t":"All of the following are among the MOST effective anti-fraud controls in ACFE research EXCEPT:","o":["A reporting hotline","Anti-fraud training and a code of conduct","Proactive data monitoring/analysis","Eliminating the internal audit function"],"a":3,"e":"<strong>Eliminating internal audit weakens</strong> the control environment. Hotlines, training/code of conduct, and proactive data monitoring are consistently among the most effective controls."},"s3n16":{"sec":"s3","t":"Under the ACFE Code of Professional Ethics, a CFE shall:","o":["Express an opinion on legal guilt when confident","Never express an opinion on the legal guilt or innocence of any person","Accept any engagement regardless of conflicts","Withhold material findings from the client"],"a":1,"e":"A core CFE Code duty is to <strong>never express an opinion on the legal guilt or innocence</strong> of any person — that determination belongs to the trier of fact."},"s3n17":{"sec":"s3","t":"The CFE Code requires that any professional opinion rendered be supported by:","o":["The client’s instructions","A reasonable evidential basis","A majority vote of the team","The examiner’s personal conviction"],"a":1,"e":"A CFE must obtain evidence providing a <strong>reasonable basis</strong> for any opinion. Unsupported or speculative opinions breach the Code."},"s3n18":{"sec":"s3","t":"Which statement about legality and ethics is correct?","o":["If it’s legal, it’s automatically ethical","An act can be legal yet unethical","Law and ethics are identical","Only illegal acts can be unethical"],"a":1,"e":"<strong>Legal does not always mean ethical.</strong> Examiners must distinguish morality, ethics, and legality and hold to professional standards beyond the legal minimum."},"s3n19":{"sec":"s3","t":"A reporting hotline is associated with which outcomes in ACFE studies?","o":["Slower detection and higher losses","Faster detection and lower losses","No measurable effect","Higher losses but faster detection"],"a":1,"e":"Organizations with hotlines tend to detect fraud <strong>faster and with lower losses</strong>, because tips are the leading detection channel."},"s3n20":{"sec":"s3","t":"TRUE or FALSE: A fraud risk assessment should be performed once and then treated as a permanent record.","o":["True","False"],"a":1,"e":"<strong>False.</strong> An FRA must be <strong>periodic and ongoing</strong>, refreshed as the business, personnel, and risk environment change — not a one-time checkbox."},"s3n21":{"sec":"s3","t":"Differential association theory explains fraud primarily as:","o":["A purely genetic predisposition","Learned behavior acquired through interaction with others who rationalize it","A random act with no social cause","A failure of accounting software"],"a":1,"e":"<strong>Differential association</strong> (Sutherland) holds that criminal behavior, including the techniques and rationalizations, is <em>learned</em> through association with others."},"s3n22":{"sec":"s3","t":"Which control is PREVENTIVE rather than detective?","o":["Bank reconciliation","Surprise audit","Requiring authorization before a payment is made","Exception reporting after the fact"],"a":2,"e":"<strong>Requiring prior authorization</strong> stops an improper payment before it happens — a preventive control. Reconciliations, surprise audits, and exception reports detect issues after the fact."}},"flashcards":[{"sec":"s1","q":"Skimming vs cash larceny?","a":"Skimming = theft of cash BEFORE recording (off-book, no trail). Cash larceny = theft AFTER recording (on-book, creates a discrepancy)."},{"sec":"s1","q":"Lapping","a":"Crediting one customer's account with a later customer's payment to conceal stolen receipts, rolling the shortfall forward. Classic receivables-skimming concealment."},{"sec":"s1","q":"Five financial-statement fraud families","a":"Fictitious revenue, timing differences, concealed liabilities, improper disclosures, improper asset valuation."},{"sec":"s1","q":"Bribery vs illegal gratuity","a":"Bribery = intent to INFLUENCE a future decision. Illegal gratuity = reward AFTER a decision, no prior agreement to influence."},{"sec":"s1","q":"Money-laundering stages","a":"Placement → Layering → Integration. (Structuring/smurfing is a placement technique.)"},{"sec":"s1","q":"FSF frequency vs cost","a":"Financial statement fraud = least frequent, highest median loss. Asset misappropriation = most frequent, lowest median loss. Corruption in between."},{"sec":"s1","q":"Shell vs pass-through billing","a":"Shell = bills for goods/services never delivered. Pass-through = actually buys goods then resells to employer at inflated markup."},{"sec":"s1","q":"Check kiting","a":"Exploiting the float (clearing delay) between accounts/banks to create artificial balances from insufficient funds."},{"sec":"s1","q":"Ponzi vs pyramid","a":"Ponzi = returns paid from new investors' money. Pyramid = income chiefly from recruitment, not product sales."},{"sec":"s1","q":"Tax evasion vs avoidance","a":"Evasion = illegal, willful intent to defeat tax. Avoidance = lawful minimization of tax."},{"sec":"s2","q":"Fraud theory approach","a":"Analyze data → create hypothesis (worst-case) → test hypothesis → refine. General to specific; least- to most-culpable."},{"sec":"s2","q":"Predication","a":"Totality of circumstances leading a reasonable, trained professional to believe fraud occurred/is occurring/will occur. Required before any examination."},{"sec":"s2","q":"Burden of proof ladder","a":"Beyond a reasonable doubt (criminal) > clear and convincing > preponderance of evidence ('more likely than not', civil)."},{"sec":"s2","q":"Four elements of fraud","a":"Material false statement, knowledge of falsity, reliance by victim, resulting damages."},{"sec":"s2","q":"Direct vs circumstantial evidence","a":"Direct proves a fact without inference (eyewitness). Circumstantial requires an inference (fingerprints). Fraud cases are mostly circumstantial — and that's valid."},{"sec":"s2","q":"Chain of custody","a":"Unbroken documented record of who held evidence and when. A gap can make evidence inadmissible."},{"sec":"s2","q":"Hash value in digital forensics","a":"A matching hash (MD5/SHA) proves a forensic image is bit-for-bit identical to the original and unaltered. Always work on the image, never the original."},{"sec":"s2","q":"Interview question sequence","a":"Introductory → Informational → Closing → Assessment → Admission-seeking. Last two only when warranted."},{"sec":"s2","q":"Alternative question","a":"Admission-seeking technique offering two incriminating choices, one more face-saving, to move the subject toward confession."},{"sec":"s2","q":"Net worth method","a":"Asset increases + living expenses − income from known sources = likely illicit/unreported funds. Headline indirect tracing method."},{"sec":"s2","q":"Benford's Law scope","a":"Applies to natural numbers (invoice/payment amounts), NOT assigned numbers (phone, account, ID). Leading digit 1 ≈ 30.1%."},{"sec":"s2","q":"Testifying limit","a":"A fraud examiner must NOT opine on the legal guilt/innocence of the accused — that's for the trier of fact. Opine only within expertise."},{"sec":"s3","q":"Fraud Triangle","a":"Pressure + Opportunity + Rationalization (Cressey). The foundational fraud concept. Fraud Diamond adds Capability."},{"sec":"s3","q":"Occupational fraud categories","a":"Asset misappropriation (most frequent, least costly) → Corruption → Financial statement fraud (least frequent, most costly)."},{"sec":"s3","q":"COSO five components","a":"Control environment, Risk assessment, Control activities, Information & communication, Monitoring activities."},{"sec":"s3","q":"Segregation of duties","a":"Separate authorization, recording, and custody of assets. Its absence is the most-cited control weakness."},{"sec":"s3","q":"Who owns internal controls?","a":"Management — not auditors. Management is primarily responsible for preventing/detecting fraud. Auditors give reasonable (not absolute) assurance."},{"sec":"s3","q":"Inherent vs residual risk","a":"Inherent = risk before controls. Residual = risk remaining after mitigating controls. Assess inherent first."},{"sec":"s3","q":"#1 fraud detection method","a":"Tips. This is why reporting hotlines are among the most effective anti-fraud controls."},{"sec":"s3","q":"Two tested CFE Code duties","a":"(1) Never opine on legal guilt/innocence. (2) Obtain evidence giving a reasonable basis for any opinion rendered."}]}</script>
