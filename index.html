<script id="DATA" type="application/json">{"meta":{"examDays":25,"studyDaysPerWeek":6,"passMark":75,"sections":{"s1":{"name":"Fraud Schemes & Financial Crimes","q":120,"mins":150,"weight":"~38%"},"s2":{"name":"Fraud Investigations & Legal Issues","q":120,"mins":150,"weight":"~38%"},"s3":{"name":"Fraud Prevention & Deterrence","q":70,"mins":90,"weight":"~24%"}}},"plan":[{"d":1,"sec":"s1","title":"Accounting & financial-statement fraud","topics":["t1"],"quiz":"q_d1"},{"d":2,"sec":"s1","title":"FSF scheme families & frequency","topics":["t2"],"quiz":"q_d2"},{"d":3,"sec":"s1","title":"Cash receipts: skimming vs larceny","topics":["t3"],"quiz":"q_d3"},{"d":4,"sec":"s1","title":"Fraudulent disbursements","topics":["t4"],"quiz":"q_d4"},{"d":5,"sec":"s1","title":"Inventory, corruption & conflicts","topics":["t5"],"quiz":"q_d5"},{"d":6,"sec":"s1","title":"Bank, loan & real-estate fraud","topics":["t6"],"quiz":"q_d6"},{"d":7,"sec":"s1","title":"Money laundering & AML","topics":["t7"],"quiz":"q_d7"},{"d":8,"sec":"s1","title":"Payment, cyber, consumer & Section 1 drill","topics":["t11","t8"],"quiz":"q_d8"},{"d":9,"sec":"s2","title":"Planning a fraud examination","topics":["t12"],"quiz":"q_d9"},{"d":10,"sec":"s2","title":"Law: elements & burdens of proof","topics":["t13"],"quiz":"q_d10"},{"d":11,"sec":"s2","title":"Key statutes: SOX, RICO, FCA, FCPA","topics":["t14b"],"quiz":"q_d11"},{"d":12,"sec":"s2","title":"Rights & basic evidence law","topics":["t14"],"quiz":"q_d12"},{"d":13,"sec":"s2","title":"Collecting & digital evidence","topics":["t15"],"quiz":"q_d13"},{"d":14,"sec":"s2","title":"Interview theory & question types","topics":["t16"],"quiz":"q_d14"},{"d":15,"sec":"s2","title":"Admission-seeking & deception","topics":["t17"],"quiz":"q_d15"},{"d":16,"sec":"s2","title":"Tracing assets, Benford & net worth","topics":["t18"],"quiz":"q_d16"},{"d":17,"sec":"s2","title":"Court, testifying, reports & Law drill","topics":["t19","t20"],"quiz":"q_d17"},{"d":18,"sec":"s3","title":"Financial crime & criminology","topics":["t21"],"quiz":"q_d18"},{"d":19,"sec":"s3","title":"Detection reality: tips & hotlines","topics":["t21b"],"quiz":"q_d19"},{"d":20,"sec":"s3","title":"Governance & management duties","topics":["t22"],"quiz":"q_d20"},{"d":21,"sec":"s3","title":"Auditors, COSO & internal controls","topics":["t23"],"quiz":"q_d21"},{"d":22,"sec":"s3","title":"Risk assessment, ethics & CFE Code","topics":["t24","t25"],"quiz":"q_d22"},{"d":23,"sec":"mock","title":"Mock Exam — Section 1","topics":[],"quiz":"mock_s1"},{"d":24,"sec":"mock","title":"Mock Exam — Section 2","topics":[],"quiz":"mock_s2"},{"d":25,"sec":"mock","title":"Mock Exam — Section 3 + final review","topics":[],"quiz":"mock_s3"}],"lessons":{"t1":{"sec":"s1","title":"Accounting foundations & financial-statement fraud (FSF)","day":1,"body":[{"h":"The essentials"},{"p":"Under <em>accrual</em> accounting, revenue is recognized when it is <strong>earned</strong> and expenses when <strong>incurred</strong> — not when cash moves. Almost all financial-statement fraud lives in that timing gap. Keep the equation in mind: <strong>Assets = Liabilities + Owners' equity</strong>; every fraudulent entry must still balance, which is why fraudsters force offsets somewhere."},{"p":"FSF is the <strong>deliberate misrepresentation of a company's financial condition</strong> through intentional misstatement or omission to deceive users. It is the <strong>least frequent but most costly</strong> occupational-fraud category. It crosses from 'aggressive accounting' into fraud when there is a <em>material</em> misstatement plus <em>intent to deceive</em> users who rely on the statements."},{"h":"Why it happens & how it's detected"},{"ul":["<strong>Motive:</strong> hit earnings/analyst targets, trigger bonuses, prop up a share price, or hide a decline.","<strong>Vertical (common-size) analysis</strong> — each line as a % of a base (sales for P&L, total assets for balance sheet). Best for spotting an abnormal COGS-to-sales or margin shift.","<strong>Horizontal analysis</strong> — % change line-by-line across periods.","<strong>Ratio analysis</strong> — receivable/inventory turnover, current ratio, gross margin."]},{"key":"Capitalizing a routine expense (booking a repair as a fixed asset) <strong>overstates assets AND overstates net income</strong>, because the expense is improperly deferred off the income statement. This exact mechanic is tested repeatedly."},{"h":"Red-flag cluster"},{"p":"Revenue growing faster than operating cash flow; receivables growing faster than sales; recurring 'one-time' items; a dominant CEO/CFO who overrides controls. (Stable operating cash flow funding dividends is a sign of health, <em>not</em> a red flag — a classic EXCEPT trap.)"},{"case":"<strong>Telecom — capacity swaps:</strong> two carriers sell each other equal network capacity at inflated prices, each booking the inflow as revenue while burying the outflow as a capital asset. Result: fictitious revenue + capitalized expense in one move. Red flag — large round-number transactions with a single counterparty near quarter-end."},{"case":"<strong>Software — channel stuffing:</strong> a vendor ships far more product to distributors than they can sell, with a quiet right-of-return, booking it all as revenue to hit the quarter. Red flag — a Q4 sales spike followed by Q1 returns and bloated distributor inventory."},{"eye":"Examiner's eye: when revenue rises but operating cash flow lags, follow the receivables. Genuine sales convert to cash; fictitious ones pile up as 'uncollected' balances."}]},"t2":{"sec":"s1","title":"The five FSF scheme families & where they hide","day":2,"body":[{"h":"Memorise these five — questions give a scenario and ask which family"},{"table":[["Family","What happens / tell"],["Fictitious revenue","Sales to fake or phantom customers; sham related-party sales."],["Timing differences","Real revenue/expense in the wrong period (channel stuffing, premature recognition)."],["Concealed liabilities & expenses","Omitting payables, warranty/litigation reserves; capitalizing operating costs."],["Improper disclosures","Omitting related parties, contingencies, subsequent events, going-concern doubt."],["Improper asset valuation","Inflating inventory, receivables, or fixed assets; not writing down impaired assets."]]},{"key":"'December sales booked in November' = <strong>timing difference</strong> (real sale, wrong period). 'Failing to record warranty/litigation reserves' = <strong>concealed liabilities</strong>. 'Sales to a shell customer that doesn't exist' = <strong>fictitious revenue</strong>. The distinction is the whole game."},{"h":"Frequency vs cost — the inverse law"},{"p":"Across all occupational fraud: <strong>asset misappropriation</strong> is most frequent but lowest median loss; <strong>financial statement fraud</strong> is least frequent but highest median loss; <strong>corruption</strong> sits in between. Expect at least one question on this ranking."},{"case":"<strong>Retail/distribution — bill-and-hold:</strong> a manufacturer 'sells' goods but holds them in its own warehouse, booking revenue though the customer hasn't taken delivery or accepted risk. Tell — revenue recognized while inventory physically stays put and shipping docs are missing."},{"case":"<strong>Manufacturing — cookie-jar reserves:</strong> in good years management over-accrues reserves, then quietly releases them in weak years to smooth earnings. Tell — reserve balances that move opposite to business conditions."},{"eye":"Examiner's eye: improper disclosure fraud leaves no number wrong on the face of the statements — it hides in the notes. Always read related-party and subsequent-events footnotes against the transaction data."}]},"t3":{"sec":"s1","title":"Cash-receipts schemes: skimming vs cash larceny","day":3,"body":[{"h":"The distinction the exam loves"},{"key":"<strong>Skimming = theft of cash BEFORE it is recorded (off-book).</strong> No audit trail, because the sale/receipt was never entered. <strong>Cash larceny = theft AFTER it is recorded (on-book).</strong> A discrepancy appears between the records and the cash on hand (a drawer shortage)."},{"p":"So if an employee rings 'no sale' and pockets the cash → <strong>skimming</strong> (nothing recorded). If a cashier removes cash from a sale already recorded, creating a drawer shortage → <strong>cash larceny</strong>."},{"h":"Lapping — the signature concealment"},{"p":"<strong>Lapping</strong> hides skimmed receivables: steal Customer A's payment, then post Customer B's later payment to A's account, then cover B with C — rolling the shortfall forward indefinitely. The classic tell is <strong>customer complaints that payments were misapplied or posted late</strong>. Independent reconciliation and customer confirmations break it."},{"h":"Prevention"},{"p":"<strong>Segregation of duties</strong> is the core control: whoever receives cash must not also record and reconcile it. Add surprise cash counts, independent bank reconciliations, and matching recorded sales to register tapes."},{"case":"<strong>Casino — the cage & the rail:</strong> a cage cashier voids legitimate chip redemptions and keeps the cash before it's logged — off-book skimming. Casinos counter with the 'eye in the sky', mandatory dual control at the cage, and reconciling the drop box to logged transactions."},{"case":"<strong>Restaurant/bar — the unrung drink:</strong> a bartender serves cash customers without ringing the sale, pocketing the money and keeping pour counts plausible. Tell — pour/usage variance: liquor consumed exceeds recorded sales."},{"case":"<strong>Charity/collections — offering skimming:</strong> a volunteer counts cash donations alone and removes a cut before any record exists. Tell — donation income that doesn't track attendance or pledge data."},{"eye":"Examiner's eye: skimming's defining weakness for the fraudster is that it caps how much they can take — once a sale is unrecorded, they can't easily inflate it. Larceny leaves a trail; skimming leaves a gap. Look for what's missing, not just what's wrong."}]},"t4":{"sec":"s1","title":"Fraudulent disbursements: the on-book payouts","day":4,"body":[{"h":"The essentials"},{"p":"Disbursement schemes are <strong>on-book</strong>: the company's own funds leave through its accounting system on fraudulent documentation. These are the most common occupational frauds. Five families:"},{"table":[["Scheme","Core mechanism"],["Billing","Shell-company invoices, personal purchases, inflated/duplicate invoices. Most common & costly."],["Payroll","Ghost employees, falsified hours/commissions, inflated pay rates."],["Expense reimbursement","Mischaracterized, overstated, fictitious, or duplicate claims."],["Check & payment tampering","Forged maker/endorsement, altered payee, authorized-maker abuse."],["Register disbursement","False refunds and false voids — a RECORDED transaction to justify removing cash."]]},{"key":"<strong>Shell vs pass-through:</strong> a pure shell bills for goods/services never delivered; a <strong>pass-through (turnaround)</strong> actually buys real goods then resells them to the employer at an inflated markup. (So 'pass-through delivers nothing' is FALSE.)"},{"key":"<strong>Register disbursement ≠ skimming.</strong> A false refund is a <em>recorded</em> fraudulent transaction used to pull cash — the recorded entry is the giveaway. Skimming records nothing."},{"h":"Detecting the big ones"},{"ul":["<strong>Ghost employees:</strong> distribute paychecks in person and reconcile to active-HR records — no real person claims a ghost's check.","<strong>Check tampering</strong> is unique: the fraudster prepares or alters the instrument itself, not just the supporting document.","<strong>Expense mischaracterization:</strong> a genuine personal purchase reported as business (e.g., a personal laptop as 'client supplies')."]},{"case":"<strong>Construction — over-billing & fake subs:</strong> a project manager sets up a shell 'subcontractor' and approves invoices for work never performed, buried in a large project's cost codes. Tell — a vendor with a PO box, no website, and invoices always just under the approval threshold."},{"case":"<strong>Healthcare payroll — the ghost nurse:</strong> a supervisor keeps a terminated nurse 'active' and redirects the pay to a controlled account. Tell — an employee with no badge-ins, no benefits enrollment, and direct deposit to an account shared with another employee."},{"eye":"Examiner's eye: billing schemes are the highest-frequency, highest-cost disbursement fraud — your VendorRecon territory. The fastest screens are duplicate-invoice tests, round-dollar invoices, vendors whose address matches an employee's, and invoices clustered just below approval limits."}]},"t5":{"sec":"s1","title":"Inventory theft, corruption & conflicts of interest","day":5,"body":[{"h":"Non-cash asset misappropriation"},{"p":"Two routes: <strong>misuse</strong> (borrowing assets — low loss, hard to prove damages) and <strong>larceny</strong> (outright theft). <strong>Shrinkage</strong> — the unaccounted-for reduction in inventory — is the primary red flag; fraudsters keep it within 'normal' ranges to avoid scrutiny. <strong>Physical padding</strong> (stacking empty cartons during a count) fakes quantity on hand."},{"h":"The four forms of corruption"},{"table":[["Form","Essence"],["Bribery","A thing of value to INFLUENCE a business decision (includes kickbacks)."],["Illegal gratuity","A reward for a decision ALREADY made — no prior intent to influence."],["Economic extortion","The DEMAND side — an employee demands payment to decide in the payer's favour."],["Conflict of interest","An undisclosed economic/personal interest in a transaction."]]},{"key":"<strong>Bribery vs illegal gratuity</strong> turns entirely on timing/intent: bribery influences a <em>future</em> decision; an illegal gratuity rewards a <em>past</em> one. A <strong>kickback</strong> is a vendor returning part of an overbilling to the employee who steered the deal. A <strong>conflict of interest</strong> becomes fraud when the interest is <em>undisclosed</em> and divided loyalty harms the employer."},{"h":"Bid-rigging (procurement collusion)"},{"ul":["<strong>Complementary (cover) bids</strong> — deliberately high bids to fake competition.","<strong>Bid suppression</strong> — agreeing not to bid.","<strong>Bid rotation</strong> — taking turns being the low bidder.","<strong>Market division</strong> — splitting territories/customers."]},{"case":"<strong>Casino — chip walking & comp abuse:</strong> a host with an undisclosed stake in a junket operator steers high-roller comps and rebates to that operator. Undisclosed interest + steering = conflict of interest layered with kickbacks."},{"case":"<strong>Public works — the paving cartel:</strong> three contractors rotate who wins each municipal contract, submitting cover bids for the others. Tell — the same firms always bid, margins are suspiciously uniform, and the 'winner' rotates predictably."},{"case":"<strong>Retail procurement — the slotting kickback:</strong> a category buyer awards premium shelf space to a supplier who funds the buyer's personal credit card. Tell — a mid-tier supplier consistently winning against stronger competitors."},{"eye":"Examiner's eye: corruption is detected far more by tips and relationship analysis than by the books — the transaction often looks normal. Map employee-vendor connections, lifestyle changes, and exclusive-dealing patterns."}]},"t6":{"sec":"s1","title":"Financial-institution, loan & real-estate fraud","day":6,"body":[{"h":"Directly your ICICI HFC world"},{"p":"Bank fraud clusters around embezzlement, loan fraud, real-estate fraud, new-account fraud and wire fraud. The <strong>Basel Committee on Banking Supervision</strong> sets global <em>prudential</em> standards (sound risk management) — distinct from FATF, which sets AML standards."},{"h":"Loan fraud — the high-value core"},{"ul":["<strong>Nominee / straw-borrower loan</strong> — loan in a front person's name for the real party's benefit (evades exposure limits, hides risk).","<strong>Loans to nonexistent borrowers</strong> and <strong>air loans</strong> (wholly fictitious property/borrower).","<strong>Double-pledged collateral</strong>; <strong>false applications</strong> (income/asset/occupancy misrepresentation).","<strong>Reciprocal loans</strong> between insiders to hide losses; <strong>construction draw fraud</strong>."]},{"key":"<strong>Appraisal (valuation) fraud</strong> — inflating a property's value to justify a larger mortgage — is your ValuGuard domain. Distinguish it from an <strong>air loan</strong>, which is on a property/borrower that doesn't exist at all."},{"h":"Anti-bribery law you must know"},{"p":"The U.S. <strong>FCPA</strong> prohibits bribing <em>foreign officials</em> to obtain or retain business and requires accurate books & records plus internal accounting controls. The UK Bribery Act is broader (covers private bribery and 'failure to prevent')."},{"case":"<strong>Mortgage — the straw buyer ring:</strong> an organizer recruits people with clean credit to 'buy' inflated properties using a corrupt appraiser; loans fund, proceeds are split, and the straws walk away — the loans default. Tell — multiple loans, same appraiser, same closing agent, owner-occupancy claims that don't match utility records."},{"case":"<strong>Trade finance — the phantom shipment:</strong> a borrower draws on a letter of credit using forged bills of lading for goods never shipped. Tell — shipping documents that don't reconcile to vessel/port records."},{"eye":"Examiner's eye: insider involvement multiplies loss. The most damaging bank frauds pair an outsider's false application with an insider who waves it through — so test the approver, not just the applicant."}]},"t7":{"sec":"s1","title":"Money laundering & anti-money-laundering","day":7,"body":[{"h":"The three stages — memorise cold"},{"table":[["Stage","What happens"],["Placement","Dirty cash enters the system (deposits, structuring/smurfing, cash-intensive fronts)."],["Layering","Complex transfers obscure the source (shells, wire chains, cross-border movement)."],["Integration","'Clean' funds re-enter the economy as legitimate-looking assets (property, business, luxury)."]]},{"key":"Order: <strong>Placement → Layering → Integration.</strong> <strong>Structuring (smurfing)</strong> — breaking cash into sub-threshold deposits to dodge reporting — is a <em>placement</em>-stage red flag, and is an offence in itself <em>even if the cash is from a legal source</em>, because the intent is to defeat reporting. This is exactly the self-transfer / sub-threshold signal your StaffLens flags."},{"h":"International framework"},{"ul":["<strong>FATF</strong> — issues the 40 Recommendations; the global AML/CFT standard-setter.","<strong>Egmont Group</strong> — links national Financial Intelligence Units; <strong>Wolfsberg</strong> principles; <strong>Basel</strong> guidance.","KYC/CDD, enhanced due diligence for high-risk customers, currency-transaction and suspicious-activity reporting."]},{"p":"Maps cleanly to India's <strong>PMLA</strong>: placement/layering/integration is the same language — but answer the exam in <em>FATF/BSA</em> framing."},{"case":"<strong>Casino laundering:</strong> a launderer buys chips with dirty cash, gambles minimally, then cashes out asking for a casino cheque — 'clean' winnings. Counters: chip-purchase logging, cash-transaction reporting, and 'minimal-play cash-out' alerts."},{"case":"<strong>Trade-based laundering:</strong> over- or under-invoicing exports moves value across borders disguised as trade. Tell — invoice prices wildly off market for the goods described."},{"case":"<strong>Crypto layering:</strong> funds are split across wallets, run through mixers/tumblers, then consolidated and off-ramped. Tell — rapid many-hop transfers with no economic purpose."},{"eye":"Examiner's eye: structuring is about <em>intent to evade a threshold</em>, not the amount. Many small, just-under-limit, round-number deposits across branches or days is the pattern — amount alone never proves it."}]},"t8":{"sec":"s1","title":"Payment, identity, cyber, consumer & tax fraud","day":8,"body":[{"h":"Payment fraud"},{"ul":["<strong>Check kiting</strong> — exploiting the <em>float</em> (clearing delay) between two banks by passing checks against insufficient funds to fake a balance.","Payment-card fraud (skimming, card-not-present), electronic/P2P fraud, alternative currencies."]},{"h":"Identity theft & cyberfraud"},{"ul":["<strong>Synthetic identity theft</strong> — combine a real (stolen) ID number with a fabricated name/DOB to create a new identity. Distinct from <strong>account takeover</strong> (hijacking an existing account).","<strong>Business email compromise (BEC)</strong> — impersonate an executive/vendor by email to redirect a payment. Heavily emphasised in the 2026 blueprint.","Malware (ransomware, keyloggers), phishing/spear-phishing, the CIA triad (Confidentiality, Integrity, Availability)."]},{"h":"Consumer schemes & tax"},{"key":"<strong>Ponzi</strong> pays 'returns' from new investors' money (no real returns). <strong>Pyramid</strong> derives income chiefly from <em>recruitment</em>, not product sales. <strong>Tax evasion is illegal and requires willful intent</strong> to defeat tax; <strong>tax avoidance is lawful</strong> minimization. The willfulness/legality line is the tested point."},{"case":"<strong>Banking — the BEC wire:</strong> 'CEO' emails the AP clerk near closing on a Friday: urgent confidential acquisition, wire to this new account, don't call me. Tell — urgency + secrecy + a new beneficiary + a spoofed look-alike domain. Control: out-of-band callback verification on any change of payment details."},{"case":"<strong>Insurance — staged accident ring:</strong> organized crews stage collisions and file inflated injury claims through complicit clinics and lawyers. Tell — same clinic, same attorney, soft-tissue injuries, identical treatment counts across unrelated 'victims'."},{"case":"<strong>Elder fraud — the romance/advance-fee combo:</strong> a victim is groomed online, then asked for fees to release a fictitious fortune. Tell — escalating wire requests to overseas accounts, secrecy from family."},{"eye":"Examiner's eye: BEC and kiting both exploit timing and trust, not broken controls. The defence is procedural — verification callbacks for payment changes, and monitoring inter-bank float and rapid in-out account activity."}]},"t11":{"sec":"s1","title":"Section 1 fast-recognition drill","day":8,"body":[{"h":"Classify any cash scenario in one pass"},{"key":"Was it recorded? <strong>No → skimming.</strong> Recorded, then stolen → <strong>cash larceny.</strong> Paid out through the system on fake docs → <strong>fraudulent disbursement</strong> (then sub-classify: billing / payroll / expense / check / register)."},{"h":"Rapid tells"},{"ul":["'No-sale' rung, cash pocketed → skimming.","Customer A credited with B's payment → lapping.","Fake vendor, no goods → shell-company billing.","Real goods resold to employer at markup → pass-through.","Recorded false refund → register disbursement.","Empty cartons at the count → physical padding.","Reward after the award, no prior deal → illegal gratuity (not bribery).","Sub-threshold deposits → structuring (placement)."]},{"eye":"Examiner's eye: most wrong answers are the <em>adjacent</em> scheme. Classify first from the facts, then confirm against the options — don't let a tempting near-miss pull you off."}]},"t12":{"sec":"s2","title":"Planning & conducting a fraud examination","day":9,"body":[{"h":"What it is (and isn't)"},{"p":"A fraud examination is a <strong>methodology for resolving a specific allegation from inception to disposition</strong> — gathering evidence, taking statements, writing reports, testifying. It is <em>not</em> an audit: audits are recurring and general; examinations are specific and allegation-driven."},{"h":"The fraud theory approach"},{"ol":["<strong>Analyze</strong> available data.","<strong>Create a hypothesis</strong> (assume a worst-case scenario from the data).","<strong>Test</strong> the hypothesis against evidence.","<strong>Refine / amend</strong> as new facts emerge."]},{"key":"Two golden rules: conduct the exam <strong>general → specific</strong>, and interview <strong>least-culpable → most-culpable</strong>, so you reach the prime suspect last, armed with evidence."},{"h":"Predication — the gate"},{"p":"<strong>Predication</strong> is the totality of circumstances that would lead a reasonable, professionally trained person to believe a fraud has occurred, is occurring, or will occur. <strong>No examination — and no admission-seeking interview or covert operation — begins without it.</strong> Mere suspicion isn't predication; 'fishing expeditions' violate the standard."},{"case":"<strong>Manufacturing tip:</strong> an anonymous hotline call says a plant manager is steering scrap-metal sales to his cousin's yard below market. Combined with falling scrap revenue, that's predication — enough for a reasonable professional to open an exam, starting general (scrap process) before specific (the manager)."},{"eye":"Examiner's eye: write down your predication before you act. If you can't articulate why a reasonable professional would suspect fraud, you're not ready to start — and a defence lawyer will say so later."}]},"t13":{"sec":"s2","title":"The law related to fraud: elements, burdens & systems","day":10,"body":[{"h":"The four common-law elements of fraud"},{"p":"(1) a <strong>material false statement</strong>, (2) <strong>knowledge</strong> of its falsity, (3) victim <strong>reliance</strong>, and (4) resulting <strong>damages</strong>. Memorise these four — they recur across the section."},{"h":"Burden of proof — the #1 Law trap"},{"key":"Lowest → highest: <strong>preponderance of the evidence</strong> ('more likely than not', civil) → <strong>clear and convincing</strong> → <strong>beyond a reasonable doubt</strong> (criminal). Criminal = state prosecutes, punishment; civil = private party, remedies/damages."},{"h":"Legal systems"},{"ul":["<strong>Common law</strong> — judge-made precedent, adversarial (US/UK/India framework).","<strong>Civil law</strong> — codified statutes, inquisitorial.","<strong>Parallel proceedings</strong> — civil and criminal can run at once; manage self-incrimination and discovery conflicts."]},{"case":"<strong>Cross-border bank fraud:</strong> the same conduct triggers a criminal case (state, beyond a reasonable doubt) and a civil recovery suit by the bank (preponderance). The lower civil bar is why a defendant can be acquitted criminally yet still lose the civil case."},{"warn":"This is your self-identified weak area. Drill the burden ladder and the four elements until automatic — they anchor most Law questions."},{"eye":"Examiner's eye: 'material' and 'reliance' do real work. A false statement nobody relied on, or one too trivial to matter, often fails the legal test even when it feels dishonest."}]},"t14b":{"sec":"s2","title":"Key statutes: SOX, RICO, False Claims Act, FCPA","day":11,"body":[{"h":"The statutes the exam tests (in their framing)"},{"ul":["<strong>Sarbanes-Oxley (SOX)</strong> — CEO/CFO certification of financials, stronger governance, whistleblower protection, criminal penalties for document destruction.","<strong>RICO</strong> — targets a <em>pattern of racketeering activity</em>; powerful criminal penalties and civil treble damages.","<strong>False Claims Act</strong> — fraud against the government; allows <strong>qui tam</strong> suits where a private 'relator' (whistleblower) sues on the government's behalf and shares any recovery.","<strong>Mail & wire fraud</strong> — broad federal hooks needing a scheme to defraud plus use of mail/wires.","<strong>FCPA</strong> — foreign bribery plus books-and-records and internal-control provisions."]},{"key":"Match the trigger word: 'pattern of racketeering' → RICO; 'whistleblower sues for the government and shares recovery' → qui tam / False Claims Act; 'CEO certifies the financials' → SOX; 'bribing a foreign official' → FCPA."},{"case":"<strong>Healthcare — qui tam:</strong> a billing clerk discovers systematic Medicare upcoding and files a qui tam suit; the government intervenes and the relator shares the recovery. This whistleblower channel surfaces a large share of government-fraud cases."},{"case":"<strong>Corporate — SOX document destruction:</strong> after a subpoena, staff shred engagement files. The shredding itself is a separate SOX offence, independent of the underlying fraud."},{"eye":"Examiner's eye: these statutes are tested as recognition, not litigation. Lock the one-line trigger for each; you rarely need the sub-sections."}]},"t14":{"sec":"s2","title":"Rights during investigations & basic evidence law","day":12,"body":[{"h":"Public vs private power"},{"p":"Constitutional criminal protections (4th/5th Amendment, Miranda) primarily restrain <strong>government</strong> action. A <strong>private employer is not required to give Miranda warnings</strong> before interviewing an employee — though employment law, contracts and policies still apply. (<strong>Garrity</strong>: public employees can't be forced to self-incriminate on threat of firing; <strong>Weingarten</strong>: union reps in investigatory interviews.)"},{"h":"Forms & weight of evidence"},{"table":[["Type","Meaning"],["Testimonial","Statements under oath."],["Real / physical","Tangible objects."],["Documentary","Documents, records, writings."],["Demonstrative","Charts/models that explain other evidence."]]},{"key":"<strong>Direct evidence</strong> proves a fact without inference (an eyewitness who saw the act). <strong>Circumstantial evidence</strong> requires an inference (fingerprints). <strong>Most fraud cases are built largely on circumstantial evidence — and that is fully valid and admissible.</strong> So 'fraud needs direct evidence' is FALSE."},{"h":"Admissibility, privilege, custody"},{"ul":["Relevant, material, competent evidence is admissible; hearsay generally excluded (with exceptions).","<strong>Attorney-client privilege</strong> and <strong>work-product doctrine</strong> protect materials — run exams under counsel to preserve them.","<strong>Chain of custody</strong> must be unbroken; a documented gap can render evidence inadmissible."]},{"case":"<strong>Procurement case:</strong> the only proof a manager rigged bids is circumstantial — his sister owns the winning vendor, bids were opened early, and prices track his emails. No eyewitness, yet the inference chain is strong enough to prove the case."},{"eye":"Examiner's eye: juries are taught that circumstantial evidence is not 'weaker' than direct — a fingerprint can be more reliable than a nervous eyewitness. Build the inference chain tightly and document custody at every step."}]},"t15":{"sec":"s2","title":"Collecting & handling evidence (incl. digital forensics)","day":13,"body":[{"h":"Document collection rules"},{"ul":["Obtain <strong>originals</strong> where possible; if copies, document why.","Maintain a <strong>chain-of-custody / evidence control log</strong>; handle minimally to preserve fingerprints, indented writing, ink/paper dating.","<strong>Never write on or annotate the original</strong> — it destroys evidentiary integrity."]},{"h":"Digital forensics (heavily weighted in 2026)"},{"ol":["<strong>Preserve</strong> — image the drive with a write-blocker; never work on the original.","Maintain <strong>chain of custody</strong> for digital media just like physical evidence.","<strong>Analyze the forensic copy</strong> — recover deleted files, metadata, logs.","<strong>Document</strong> tools and <strong>hash values</strong> (MD5/SHA)."]},{"key":"A <strong>matching hash value</strong> proves the forensic image is bit-for-bit identical to the original and unaltered — establishing integrity for court. Always analyze the <em>image</em>, never the original device. Cloud and mobile forensics are explicitly in the new blueprint."},{"case":"<strong>IP theft — the departing engineer:</strong> before resigning, an engineer mass-copies designs to a USB drive. Examiners image his laptop (write-blocked), hash it, and recover USB-insertion artifacts and deleted file remnants — all from the copy, preserving the original for court."},{"eye":"Examiner's eye: the moment you boot a suspect's original device, you change it — last-access times, temp files, logs. That single mistake can get your best evidence thrown out. Image first, always."}]},"t16":{"sec":"s2","title":"Interview theory & question typology","day":14,"body":[{"h":"The five question types — in order"},{"ol":["<strong>Introductory</strong> — build rapport, give a reason for the interview, get a commitment to cooperate (never accuse here).","<strong>Informational</strong> — open → closed → leading; gather the facts.","<strong>Closing</strong> — confirm facts, seek new info, maintain goodwill.","<strong>Assessment</strong> — establish credibility / detect deception (only when needed).","<strong>Admission-seeking</strong> — only when there is reasonable certainty of guilt."]},{"key":"Sequence is a guaranteed point: <strong>Introductory → Informational → Closing → Assessment → Admission-seeking.</strong> The last two are used only when warranted."},{"h":"Question forms"},{"ul":["<strong>Open</strong> — invites a narrative ('Tell me what happened').","<strong>Closed</strong> — specific, often yes/no.","<strong>Leading</strong> — contains its own answer ('You were in the vault that night, weren't you?'); used to confirm.","Avoid double-negative and overly complex questions."]},{"p":"<strong>Inhibitors</strong> of communication (ego threat, etiquette, trauma, forgetting) block disclosure; <strong>facilitators</strong> (recognition, sympathy, altruistic appeals) encourage it. The interviewer manages these deliberately. Conduct interviews privately, one subject at a time, documented."},{"case":"<strong>Banking interview:</strong> investigating teller cash shortages, the examiner opens with rapport and a neutral reason ('reconciling some discrepancies'), uses open questions to let the teller narrate the day, and only narrows to leading questions once the timeline contradicts the logs."},{"eye":"Examiner's eye: the introductory phase isn't small talk — it sets whether the subject cooperates. Accuse too early and you lose the informational gold you haven't mined yet."}]},"t17":{"sec":"s2","title":"Admission-seeking interviews & assessing deception","day":15,"body":[{"h":"When to use it"},{"p":"Only with <strong>reasonable certainty of guilt</strong>, conducted privately by an interviewer of suitable standing, after adequate predication. The goal is a voluntary, truthful confession."},{"h":"The sequence (high-yield)"},{"ol":["<strong>Direct accusation</strong> — stated with confidence, not as a question.","Observe reaction; repeat the accusation.","<strong>Interrupt denials</strong> — stop them before they harden (a firm denial is harder to retract).","<strong>Establish a rationalization</strong> (a morally acceptable theme) to lower resistance.","Diffuse alibis; display real evidence as needed.","<strong>Alternative question</strong> — two incriminating choices, one more face-saving ('Did you plan this, or did it just happen?').","Obtain a benchmark admission, then escalate to a full confession.","Obtain a <strong>signed written statement</strong>."]},{"key":"The <strong>alternative question</strong> is the pivotal technique. Interrupting denials before they entrench is equally tested."},{"warn":"A signed statement is in the <strong>subject's own words</strong>, with dates, approximate amounts, intent, and an acknowledgment of voluntariness. <strong>Never promise leniency or non-prosecution</strong> — it can void the confession and exceeds your authority."},{"case":"<strong>Retail — the sweethearting cashier:</strong> with CCTV and POS data already proving under-ringing for friends, the examiner accuses directly, interrupts the first denial, offers a face-saving theme ('Were you trying to help struggling friends, or just careless?'), and secures a written statement in the cashier's own words."},{"eye":"Examiner's eye: no single verbal or non-verbal cue proves deception. Clusters matter — answering a question with a question, over-qualifying, selective memory, character testimony ('I'd never do that'). Treat cues as signals to probe, never as proof."}]},"t18":{"sec":"s2","title":"Tracing assets, data analysis & sources of information","day":16,"body":[{"h":"Tracing financial transactions"},{"ul":["<strong>Direct method</strong> — follow specific transactions through the records ('follow the money').","Indirect / circumstantial methods when records are incomplete:"]},{"table":[["Method","Logic"],["Net worth method","Asset increases + living expenses − funds from known sources = likely illicit income. The headline indirect method."],["Bank deposits method","Total deposits − transfers/known sources = understated income."],["Expenditures method","Funds spent vs reported income."]]},{"key":"The <strong>net worth method</strong> is the most tested tracing technique: an unexplained rise in net worth plus living expenses, less funds from known legitimate sources, points to hidden/illicit income."},{"h":"Data analysis — Benford's Law"},{"key":"In naturally occurring amounts, leading digit <strong>1 appears ~30.1%</strong> of the time, declining to ~4.6% for 9. Deviations flag possible manipulation. It applies to <strong>natural numbers</strong> (invoice/payment amounts), <strong>not</strong> assigned/sequential numbers (phone, account, ID, badge numbers)."},{"case":"<strong>Public-official case:</strong> a clerk earning a modest salary buys two flats and a luxury car in three years. The net worth method quantifies the gap between lifestyle and known income — the core of a disproportionate-assets case (and a familiar PMLA pattern)."},{"case":"<strong>AP fraud — Benford screen:</strong> running Benford's on a year of vendor payments shows a spike in amounts beginning '48' and '49' — clustering just under a ₹50,000 approval limit, exposing split invoices."},{"eye":"Examiner's eye: Benford flags <em>where to look</em>, not guilt. A deviation is a lead; pair it with duplicate-payment and just-under-threshold tests before drawing conclusions."}]},"t19":{"sec":"s2","title":"Court actions, testifying & report writing","day":17,"body":[{"h":"Civil vs criminal & parallel proceedings"},{"ul":["Criminal: charging → arraignment → trial → verdict → appeal (beyond a reasonable doubt).","Civil: complaint → discovery → trial → judgment/remedies (preponderance).","<strong>Parallel proceedings</strong> run both at once — manage self-incrimination and discovery carefully."]},{"h":"Testifying — lay vs expert"},{"key":"A <strong>lay witness</strong> testifies to facts personally observed; an <strong>expert witness</strong> (once qualified by the court) may give <strong>opinions within their expertise</strong>. On cross-examination, stay within expertise, concede what's genuinely true, don't advocate — and <strong>never express an opinion on the legal guilt or innocence</strong> of the accused. That's for the trier of fact."},{"h":"Report writing"},{"ul":["Accurate, clear, impartial, relevant, timely. Report <strong>facts</strong>, not conclusions of law or guilt.","Common mistakes: stating legal conclusions, opining on guilt, editorializing, omitting <strong>exculpatory</strong> evidence.","To protect privilege, conduct the investigation <strong>at the direction of counsel</strong>.","A <strong>covert operation</strong> needs adequate predication and a <em>written memorandum</em> of its basis and objectives before it begins."]},{"case":"<strong>Expert on the stand:</strong> asked point-blank 'So the defendant is guilty?', the examiner answers within bounds: 'My analysis shows ₹2.1 crore moved to accounts he controlled; whether that is criminal is for the court.' Findings, not a guilt verdict."},{"eye":"Examiner's eye: a report that editorializes or buries exculpatory facts hands the defence its cross-examination. Write every line as if it will be read aloud to the jury — because it might be."}]},"t20":{"sec":"s2","title":"Section 2 consolidation — Law & investigation drill","day":17,"body":[{"h":"The highest-failure checklist"},{"key":"(1) burden-of-proof ladder, (2) four elements of fraud, (3) direct vs circumstantial, (4) chain of custody & hash integrity, (5) interview sequence, (6) admission-seeking steps & the alternative question, (7) net worth method & Benford scope, (8) never opine on guilt."},{"h":"Rapid tells"},{"ul":["'More likely than not' → preponderance → civil.","Eyewitness saw it → direct; everything inferred → circumstantial.","Two incriminating choices offered → alternative question.","Unexplained wealth + living costs − known income → net worth method.","Leading-digit distribution on invoice amounts → Benford's Law.","Examiner asked if defendant is 'guilty' → improper; opine only within expertise.","Pattern of racketeering → RICO; whistleblower sues for the government → qui tam/FCA."]},{"eye":"Examiner's eye: if you remember nothing else from Section 2 — predication before you start, general-to-specific, least-to-most-culpable, preserve chain of custody, and never declare guilt."}]},"t21":{"sec":"s3","title":"Understanding financial crime & criminology","day":18,"body":[{"h":"Definitions"},{"ul":["<strong>White-collar crime</strong> (Sutherland) — crime by a person of respectability and high social status in the course of their occupation.","<strong>Occupational fraud</strong> — using one's occupation for personal enrichment by misusing the employer's resources.","<strong>Organizational crime</strong> — offences committed by/for the organization itself."]},{"h":"The Fraud Triangle (Cressey) — the foundation of the whole exam"},{"key":"<strong>Pressure</strong> (a non-shareable financial problem) + <strong>Opportunity</strong> (a way to commit and conceal) + <strong>Rationalization</strong> (justifying it). Remove any leg and fraud is less likely. This is the single most-tested concept."},{"h":"Extensions"},{"ul":["<strong>Fraud Diamond</strong> — adds <strong>Capability</strong> (the person's position/skills/confidence to pull it off).","<strong>Fraud Scale</strong> (Albrecht) — pressure, opportunity, personal integrity.","<strong>Differential association</strong> (Sutherland) — fraud is <em>learned</em> behaviour, including its techniques and rationalizations, through association with others."]},{"h":"Occupational-fraud data (Report to the Nations)"},{"p":"By frequency/cost: <strong>asset misappropriation</strong> (most frequent, lowest median loss) → <strong>corruption</strong> → <strong>financial statement fraud</strong> (least frequent, highest median loss). <strong>Tips are the #1 detection method.</strong> Longer schemes and higher perpetrator authority drive larger losses."},{"case":"<strong>The trusted controller:</strong> a 20-year controller with gambling debts (pressure), sole control of payments and reconciliations (opportunity), telling himself he's 'just borrowing' (rationalization), and the system knowledge to hide it (capability). All four legs — the textbook long-running, high-authority, high-loss case."},{"eye":"Examiner's eye: organizations can only really control <em>opportunity</em> — they can't fix an employee's debts or beliefs. That's why segregation of duties and monitoring matter so much: they attack the one leg you can remove."}]},"t21b":{"sec":"s3","title":"Detection reality: tips, hotlines & the numbers","day":19,"body":[{"h":"How fraud is actually caught"},{"key":"<strong>Tips are consistently the #1 detection method</strong> — well ahead of internal audit or external audit. Many tips come from employees, which is why a <strong>reporting hotline</strong> is one of the most effective anti-fraud controls: organizations with hotlines detect fraud <strong>faster</strong> and suffer <strong>lower losses</strong>."},{"p":"This reframes prevention: the cheapest high-impact control is usually a well-run, well-publicised, anonymous reporting channel — not another layer of audit."},{"case":"<strong>Hospitality chain:</strong> after launching an anonymous multilingual hotline with poster campaigns in back-of-house areas, a regional manager's kickback scheme surfaces within weeks via a line cook's tip — something three years of audits had missed."},{"eye":"Examiner's eye: a hotline only works if staff trust it. Anonymity, non-retaliation, multiple channels (phone/web), and visible follow-through are what convert awareness into usable tips."}]},"t22":{"sec":"s3","title":"Corporate governance & management's responsibilities","day":20,"body":[{"h":"Who governs"},{"ul":["Board (especially <strong>independent directors</strong> and the <strong>audit committee</strong>), management, internal & external auditors, regulators, shareholders.","The <strong>audit committee</strong> oversees financial reporting, internal control, and the external auditor — a key anti-fraud governance body."]},{"h":"Management's fraud-related duties"},{"key":"<strong>Management — not the auditors — is primarily responsible</strong> for designing and maintaining internal controls and for preventing and detecting fraud. (So 'external auditors bear primary responsibility for controls' is FALSE.) Management also owns an effective compliance & ethics program and document-retention policies."},{"h":"Tone at the top"},{"p":"<strong>Tone at the top</strong> is the ethical climate leadership sets by example and messaging. A weak tone is the strongest cultural fraud-risk factor — controls underneath a corrupt leadership rarely hold."},{"case":"<strong>The override case:</strong> a company has textbook controls on paper, but a dominant CEO routinely tells staff to 'just book it, I'll explain later.' The control design is irrelevant once leadership normalises override — exactly what governance and the audit committee exist to check."},{"eye":"Examiner's eye: when assessing a control environment, watch what leaders <em>tolerate</em>, not what the policy manual says. Culture is revealed by the exceptions people are allowed to make."}]},"t23":{"sec":"s3","title":"Auditors' responsibilities & internal controls (COSO)","day":21,"body":[{"h":"Types of auditors"},{"ul":["<strong>External</strong> — opinion on the financial statements; <em>reasonable</em> (not absolute) assurance they're free of material misstatement, including from fraud.","<strong>Internal</strong> — evaluate and improve governance, risk and control; report to the audit committee.","<strong>Government</strong> — compliance and performance audits."]},{"key":"An unqualified ('clean') opinion provides <strong>reasonable, not absolute, assurance</strong>. It is <strong>not a guarantee that no fraud exists</strong> — a classic distractor."},{"h":"COSO Internal Control — five components"},{"table":[["Component","Essence"],["Control environment","Foundation: integrity, ethical values, tone at the top, governance."],["Risk assessment","Identify and analyze risks to objectives."],["Control activities","Approvals, reconciliations, segregation of duties."],["Information & communication","Capture and share relevant information."],["Monitoring activities","Ongoing and separate evaluations of control effectiveness."]]},{"key":"<strong>Five</strong> components; the <strong>control environment</strong> is the foundation. ('Fraud prosecution' is NOT a COSO component — a common trap.)"},{"h":"Control types"},{"ul":["<strong>Preventive</strong> (stop it — prior authorization, segregation of duties) vs <strong>Detective</strong> (find it — reconciliations, surprise audits, exception reports) vs <strong>Corrective</strong>.","<strong>Segregation of duties</strong> separates authorization, recording, and custody. Its absence is the most-cited control weakness."]},{"case":"<strong>Small-business reality:</strong> a 12-person firm can't fully segregate duties, so one bookkeeper authorizes, records, and reconciles. The compensating control is owner review of the bank statement <em>before</em> the bookkeeper sees it — a preventive/detective mix that attacks the opportunity leg."},{"eye":"Examiner's eye: classify a control by <em>when</em> it acts. Prior authorization stops the payment (preventive); a reconciliation finds it afterward (detective). The exam loves this timing distinction."}]},"t24":{"sec":"s3","title":"Fraud risk assessment, risk management, ethics & the CFE Code","day":22,"body":[{"h":"Fraud risk assessment (FRA)"},{"key":"Assess <strong>inherent</strong> risk first (before controls), then apply mitigating controls to reach <strong>residual</strong> risk. Prioritize by <strong>likelihood × significance (impact)</strong>. An FRA is <strong>periodic and ongoing</strong> — not a one-time checkbox — and must respond to changes in the business."},{"h":"Fraud risk management & third parties"},{"ul":["COSO/ACFE principles: governance, risk assessment, prevention & detection controls, investigation & corrective action, monitoring.","<strong>Third-party fraud risk</strong> — vendor/customer due diligence, ongoing monitoring, contractual audit rights (your VendorRecon / DMA-scoring domain).","Most effective controls per ACFE: reporting hotlines, anti-fraud training, code of conduct, proactive data monitoring."]},{"h":"Ethics & the ACFE / CFE Code"},{"key":"Two Code duties tested almost every sitting: (1) a member shall <strong>never express an opinion on the legal guilt or innocence</strong> of any person; (2) a member shall obtain evidence providing a <strong>reasonable basis</strong> for any opinion rendered. Also: maintain confidentiality, avoid undisclosed conflicts, and remember that <strong>legal does not always mean ethical</strong>."},{"case":"<strong>Vendor onboarding:</strong> a procurement team scores new suppliers on red flags (shell-company markers, PO-box addresses, name-match to employees) before approval — an FRA applied to third-party risk, attacking opportunity before a single invoice is paid."},{"eye":"Examiner's eye: an FRA that's filed and forgotten is worse than none — it creates false comfort. The value is in the refresh: new products, new vendors, new systems each open new fraud paths."}]},"t25":{"sec":"s3","title":"Fraud prevention programs & professional ethics","day":22,"body":[{"h":"What an effective program contains"},{"ul":["<strong>Proactive elements:</strong> anti-fraud policy, code of conduct, ethics training, hotlines/whistleblower mechanisms, surprise audits, proactive data monitoring, a positive work environment.","Detection-by-tip dominance is why <strong>hotlines</strong> are emphasised — they speed detection and cut losses."]},{"h":"Ethics for fraud examiners"},{"p":"Distinguish morality, ethics, and legality — an act can be <strong>legal yet unethical</strong>. Apply professional skepticism and objectivity; avoid undisclosed conflicts of interest; hold to standards beyond the legal minimum."},{"eye":"Examiner's eye: prevention isn't one control — it's a system where tone, training, hotlines, and monitoring reinforce each other. Any single control fails; the layered program is what deters."}]}},"quizzes":{"q_d1":["s1q1","s1q5","s1q4","s1n4","s1n5","s1n7","s1q34","s1n26"],"q_d2":["s1q2","s1n6","s1q3","s1n24","s1q35"],"q_d3":["s1q6","s1q7","s1n3","s1q32","s1q8","s1q9","s1n1","s1q10"],"q_d4":["s1q11","s1q12","s1n2","s1q13","s1n28","s1q14","s1n27","s1q15","s1n9"],"q_d5":["s1q16","s1q17","s1n23","s1q18","s1q19","s1n11","s1n10","s1n25","s1n12","s1q33"],"q_d6":["s1q20","s1n29","s1q21","s1n13","s1q22","s1n14","s1q23"],"q_d7":["s1q24","s1q25","s1n15","s1n16","s1q26","s1q27","s1n17"],"q_d8":["s1q28","s1n18","s1q29","s1n20","s1n19","s1q30","s1n21","s1q31","s1n22","s1n8"],"q_d9":["s2q1","s2n2","s2q2","s2n1","s2q3","s2n3","s2q4","s2n4"],"q_d10":["s2q5","s2n5","s2q6","s2n6","s2q7","s2n7","s2q29"],"q_d11":["s2q8","s2n8","s2n9","s1n29"],"q_d12":["s2q9","s2n10","s2q10","s2n11","s2q11","s2n28"],"q_d13":["s2q12","s2n13","s2q13","s2n14","s2q14","s2n15"],"q_d14":["s2q15","s2n16","s2q17","s2n17","s2q16","s2n18","s2n29"],"q_d15":["s2q18","s2n19","s2q19","s2n20","s2q20","s2n21"],"q_d16":["s2q21","s2n22","s2q22","s2n23","s2q23","s1n30"],"q_d17":["s2q24","s2n24","s2q25","s2q26","s2n25","s2q27","s2n26","s2q28","s2n30","s2q30","s2n27","s2n12"],"q_d18":["s3q1","s3n1","s3q2","s3n2","s3q3","s3n3","s3n21"],"q_d19":["s3q4","s3n4","s3n19","s3n15","s3q15"],"q_d20":["s3q5","s3n5","s3q6","s3n6","s3q7","s3n7"],"q_d21":["s3q8","s3n8","s3q9","s3n9","s3q10","s3n10","s3q11","s3n11","s3n12","s3n22"],"q_d22":["s3q12","s3n13","s3q13","s3n20","s3q14","s3n14","s3q16","s3n16","s3q17","s3n17","s3q18","s3n18"],"mock_s1":["s1q11","s1n21","s1q13","s1n24","s1q34","s1q29","s1q23","s1n5","s1n11","s1q30","s1q1","s1q25","s1q2","s1q17","s1q32","s1q21","s1q12","s1n22","s1n29","s1n9","s1n13","s1n10","s1q22","s1n8","s1q31","s1q19","s1n23","s1q18","s1n12","s1n17"],"mock_s2":["s2n6","s2q26","s2q14","s2n8","s2q4","s2q13","s2n11","s2q28","s2q17","s2n12","s2q1","s2n22","s2n1","s2q7","s2n16","s2q18","s2q25","s2n27","s2q2","s2q30","s2n5","s2q9","s2n30","s2n19","s2q15","s2n25","s2n23","s2n24","s2n26","s2q23"],"mock_s3":["s3n21","s3q10","s3q7","s3n3","s3q2","s3n2","s3n6","s3n7","s3n1","s3q1","s3n4","s3n16","s3q4","s3q17","s3n17","s3q3","s3n10","s3q8","s3q13","s3q12","s3n18","s3n5","s3n12","s3n13"]},"questions":{"s1q1":{"sec":"s1","t":"Under accrual accounting, when is revenue properly recognized?","o":["When cash is received from the customer","When it is earned, regardless of when cash changes hands","At the end of the fiscal year","When the invoice is mailed"],"a":1,"e":"Accrual accounting recognizes revenue when it is <strong>earned</strong> and expenses when incurred, independent of cash timing. Most financial-statement fraud abuses this earned-vs-cash gap to book revenue prematurely."},"s1q2":{"sec":"s1","t":"A company records December sales in November to hit a quarterly target. Which financial-statement fraud family is this?","o":["Fictitious revenue","Timing differences","Concealed liabilities","Improper asset valuation"],"a":1,"e":"Recording real transactions in the wrong period is a <strong>timing difference</strong> (premature recognition). Fictitious revenue involves fake/phantom customers; here the sales are real but mis-timed."},"s1q3":{"sec":"s1","t":"Which occupational-fraud category has the LOWEST frequency but the HIGHEST median loss?","o":["Asset misappropriation","Corruption","Financial statement fraud","Payroll fraud"],"a":2,"e":"<strong>Financial statement fraud</strong> is the rarest category but causes the largest median losses. Asset misappropriation is the inverse — most frequent, smallest median loss."},"s1q4":{"sec":"s1","t":"An analyst expresses each income-statement line as a percentage of total sales to spot anomalies. This is:","o":["Horizontal analysis","Vertical analysis","Ratio analysis","Benford's Law"],"a":1,"e":"<strong>Vertical analysis</strong> states each line as a percent of a base (sales for the income statement, total assets for the balance sheet). Horizontal analysis compares percent change across periods."},"s1q5":{"sec":"s1","t":"Aggressive-but-legal accounting becomes fraud when it crosses which line?","o":["When auditors disagree with it","When it is material AND made with intent to deceive users","When it reduces reported taxes","When it uses estimates"],"a":1,"e":"The dividing line is <strong>material misstatement plus intent to deceive</strong> users who rely on the statements. Estimates and aggressive choices alone are not fraud without that intent and materiality."},"s1q6":{"sec":"s1","t":"An employee rings 'no sale' and pockets a customer's cash. No entry is ever made. This is:","o":["Cash larceny","Skimming","Register disbursement","Billing scheme"],"a":1,"e":"Theft of cash <strong>before</strong> it enters the books is <strong>skimming</strong> (off-book). Because nothing was recorded, there's no direct audit trail — the defining feature versus larceny."},"s1q7":{"sec":"s1","t":"The key distinction between skimming and cash larceny is:","o":["The dollar amount involved","Whether the cash was recorded before being stolen","Whether a manager was involved","Whether it occurred at a register"],"a":1,"e":"<strong>Skimming = before recording (off-book); cash larceny = after recording (on-book).</strong> Larceny creates a discrepancy between records and cash on hand; skimming does not."},"s1q8":{"sec":"s1","t":"An employee steals Customer A's payment, then applies Customer B's later payment to A's account to hide it, rolling the shortfall forward. This is:","o":["Kiting","Lapping","Channel stuffing","Structuring"],"a":1,"e":"<strong>Lapping</strong> is the classic receivables-skimming concealment: crediting one customer with another's payment and continually rolling the gap forward."},"s1q9":{"sec":"s1","t":"Which is a common red flag specifically suggesting lapping?","o":["Rising gross margin","Customer complaints that payments were misapplied or late-posted","Increase in fixed assets","Higher advertising spend"],"a":1,"e":"Lapping produces <strong>misapplied/delayed customer payment postings</strong>, so customer complaints about their account status are a key tell. Independent reconciliation and confirmations help detect it."},"s1q10":{"sec":"s1","t":"Which control most directly prevents cash-receipts skimming?","o":["Annual budgeting","Segregation of duties between cash receipt, recording, and reconciliation","Capitalizing small assets","Quarterly press releases"],"a":1,"e":"<strong>Segregation of duties</strong> — the person who receives cash should not also record and reconcile it — is the core preventive control for receipts schemes."},"s1q11":{"sec":"s1","t":"Fraudulent disbursement schemes are best described as:","o":["Off-book thefts with no record","On-book schemes where company funds are paid out via fraudulent documentation","Only applicable to payroll","A form of financial statement fraud"],"a":1,"e":"Disbursements are <strong>on-book</strong>: the organization's funds leave through its own system using false documents (invoices, timesheets, expense claims, checks)."},"s1q12":{"sec":"s1","t":"A fake vendor that delivers no goods submits invoices that the colluding employee approves. This is a:","o":["Pass-through scheme","Shell-company billing scheme","Register disbursement","Expense reimbursement scheme"],"a":1,"e":"A <strong>shell company</strong> billing scheme bills for goods/services never delivered. A pass-through differs because it actually buys goods then resells to the employer at an inflated price."},"s1q13":{"sec":"s1","t":"Which disbursement scheme is unique because the fraudster physically prepares or alters the payment instrument itself?","o":["Billing","Payroll","Check & payment tampering","Expense reimbursement"],"a":2,"e":"<strong>Check/payment tampering</strong> involves preparing or altering the instrument (forged maker/endorsement, altered payee), distinguishing it from schemes that only falsify supporting documents."},"s1q14":{"sec":"s1","t":"A cashier records a false refund to justify removing cash from the register. This recorded transaction makes it:","o":["Skimming","A register disbursement scheme","Cash larceny","Lapping"],"a":1,"e":"A <strong>register disbursement</strong> (false refund/void) is a recorded fraudulent transaction used to remove cash — distinct from skimming, where nothing is recorded."},"s1q15":{"sec":"s1","t":"Ghost-employee schemes fall under which category?","o":["Billing schemes","Payroll schemes","Skimming","Corruption"],"a":1,"e":"A <strong>ghost employee</strong> (a fake or terminated person kept on payroll) is a classic <strong>payroll</strong> fraudulent-disbursement scheme."},"s1q16":{"sec":"s1","t":"Stacking empty boxes to make a warehouse look fully stocked during a count is:","o":["Lapping","Physical padding of inventory","A timing difference","Channel stuffing"],"a":1,"e":"<strong>Physical padding</strong> conceals inventory theft by faking the quantity on hand during a physical count."},"s1q17":{"sec":"s1","t":"The primary red flag for inventory theft is:","o":["High gross margin","Unexplained inventory shrinkage","Rising share price","Lower depreciation"],"a":1,"e":"<strong>Shrinkage</strong> — the unaccounted-for reduction in inventory — is the primary red flag. Fraudsters try to keep it within 'normal' ranges to avoid scrutiny."},"s1q18":{"sec":"s1","t":"A buyer rewards a vendor with a contract AFTER the award, with no prior agreement to influence the decision. This is:","o":["Bribery","An illegal gratuity","Economic extortion","A conflict of interest"],"a":1,"e":"An <strong>illegal gratuity</strong> rewards a decision already made, without a prior intent to influence. Bribery requires intent to <em>influence</em> a future decision."},"s1q19":{"sec":"s1","t":"An employee demands a payment from a vendor in exchange for favorable treatment. This is:","o":["Illegal gratuity","Economic extortion","A kickback","Conflict of interest"],"a":1,"e":"When the employee <strong>demands</strong> payment (the coercive, demand side), it is <strong>economic extortion</strong>. A kickback is typically initiated by the vendor returning part of an overbilling."},"s1q20":{"sec":"s1","t":"A conflict of interest becomes a fraud concern primarily when:","o":["The transaction is large","The employee's interest is undisclosed and harms the employer","A competitor is involved","It occurs in procurement"],"a":1,"e":"The fraud trigger is an <strong>undisclosed</strong> economic/personal interest that creates divided loyalty harming the employer. Disclosure is the dividing line."},"s1q21":{"sec":"s1","t":"A loan booked in a straw borrower's name for the real party's benefit is a:","o":["Reciprocal loan","Nominee (sham) loan","Construction draw fraud","Double-pledge"],"a":1,"e":"A <strong>nominee/sham loan</strong> uses a straw borrower to disguise the true beneficiary, often to evade lending limits or hide the real risk."},"s1q22":{"sec":"s1","t":"Inflating a property's value to support a larger mortgage is best classified as:","o":["Air loan","Appraisal fraud","Straw buyer scheme","Reciprocal loan"],"a":1,"e":"<strong>Appraisal fraud</strong> inflates the valuation to justify a larger loan — your ValuGuard domain. An 'air loan' is on a wholly nonexistent property/borrower."},"s1q23":{"sec":"s1","t":"Which body sets global prudential standards for sound banking risk management referenced in the manual?","o":["FATF","The Basel Committee on Banking Supervision","The Egmont Group","FINRA"],"a":1,"e":"The <strong>Basel Committee on Banking Supervision</strong> sets global prudential/risk-management standards for banks. FATF sets AML standards; Egmont links FIUs."},"s1q24":{"sec":"s1","t":"The correct order of the money-laundering stages is:","o":["Layering → Placement → Integration","Placement → Layering → Integration","Integration → Layering → Placement","Placement → Integration → Layering"],"a":1,"e":"<strong>Placement → Layering → Integration.</strong> Dirty cash enters the system, is obscured through complex transfers, then re-enters as apparently legitimate assets."},"s1q25":{"sec":"s1","t":"Breaking a large cash sum into multiple sub-threshold deposits to avoid reporting is:","o":["Layering","Structuring (smurfing)","Integration","Kiting"],"a":1,"e":"<strong>Structuring/smurfing</strong> is a placement-stage technique to evade currency-transaction reporting thresholds — exactly the self-transfer/sub-threshold signal your StaffLens flags."},"s1q26":{"sec":"s1","t":"Which organization issues the 40 Recommendations that form the global AML/CFT standard?","o":["Basel Committee","FATF","OECD","IOSCO"],"a":1,"e":"The <strong>Financial Action Task Force (FATF)</strong> issues the 40 Recommendations — the international AML/CFT benchmark adopted by national regimes (including India's PMLA framework)."},"s1q27":{"sec":"s1","t":"At which stage are 'clean' funds reintroduced into the economy as legitimate-looking assets?","o":["Placement","Layering","Integration","Structuring"],"a":2,"e":"<strong>Integration</strong> is the final stage, where laundered funds appear as legitimate wealth (real estate, businesses, luxury assets)."},"s1q28":{"sec":"s1","t":"Exploiting the float between two banks by writing checks against insufficient funds is:","o":["Lapping","Check kiting","Skimming","Structuring"],"a":1,"e":"<strong>Check kiting</strong> exploits the <em>float</em> (clearing delay) between accounts/banks to create artificial balances from non-existent funds."},"s1q29":{"sec":"s1","t":"An attacker impersonates a CFO by email to redirect a vendor payment to a fraudulent account. This is:","o":["Ransomware","Business email compromise (BEC)","Check kiting","Synthetic identity fraud"],"a":1,"e":"<strong>Business email compromise (BEC)</strong> uses impersonation of an executive/vendor to redirect payments — heavily emphasised in the 2026 cyberfraud blueprint."},"s1q30":{"sec":"s1","t":"Which best distinguishes a Ponzi scheme from a pyramid scheme?","o":["Ponzi pays earlier investors from new investors' funds; pyramids derive income chiefly from recruitment","They are identical","Ponzi schemes are legal","Pyramids never involve money"],"a":0,"e":"A <strong>Ponzi</strong> pays 'returns' from new investors' money (no real underlying returns). A <strong>pyramid</strong> generates income primarily from recruiting new participants rather than product sales."},"s1q31":{"sec":"s1","t":"Tax evasion differs from tax avoidance because evasion:","o":["Uses deductions","Requires willful intent to illegally escape tax","Is encouraged by authorities","Applies only to companies"],"a":1,"e":"<strong>Tax evasion is illegal and requires willful intent</strong> to defeat tax. Tax avoidance uses lawful means to minimize tax. The intent/legality line is the tested distinction."},"s1q32":{"sec":"s1","t":"A cashier removes cash that was already recorded as a sale, creating a drawer shortage. This is:","o":["Skimming","Cash larceny","Billing scheme","Illegal gratuity"],"a":1,"e":"Theft of <strong>already-recorded</strong> cash is <strong>cash larceny</strong> (on-book), evidenced here by the drawer shortage — the discrepancy skimming never produces."},"s1q33":{"sec":"s1","t":"Complementary (cover) bids, bid suppression, and bid rotation are forms of:","o":["Billing fraud","Bid-rigging in procurement","Skimming","Money laundering"],"a":1,"e":"These are collusive <strong>bid-rigging</strong> techniques in procurement fraud, undermining genuine competition."},"s1q34":{"sec":"s1","t":"Capitalizing a routine operating expense to boost current income is an example of:","o":["Fictitious revenue","Concealed liabilities / improper expense treatment","Lapping","Economic extortion"],"a":1,"e":"Improperly <strong>capitalizing an expense</strong> defers it off the income statement, understating expenses/liabilities and overstating income — a concealed-liabilities/asset-valuation manipulation."},"s1q35":{"sec":"s1","t":"Which is the MOST frequent occupational-fraud category overall?","o":["Financial statement fraud","Corruption","Asset misappropriation","Bribery"],"a":2,"e":"<strong>Asset misappropriation</strong> is the most frequent occupational fraud (though it has the lowest median loss). Corruption is mid-range; FSF is rarest but costliest."},"s2q1":{"sec":"s2","t":"A fraud examination differs from an audit primarily because it is:","o":["Recurring and general in scope","Specific, allegation-driven, and non-recurring","Performed only by external auditors","Limited to financial statements"],"a":1,"e":"A <strong>fraud examination</strong> resolves a specific allegation from inception to disposition; audits are recurring and general. Different purpose, scope, and methodology."},"s2q2":{"sec":"s2","t":"The proper sequence of the fraud theory approach is:","o":["Test → hypothesize → analyze → refine","Analyze data → create hypothesis → test hypothesis → refine","Interview → arrest → report","Hypothesize → report → analyze"],"a":1,"e":"<strong>Analyze available data → create a hypothesis (worst-case) → test it → refine.</strong> This iterative method underpins fraud examinations."},"s2q3":{"sec":"s2","t":"'The totality of circumstances that would lead a reasonable, trained professional to believe a fraud has occurred' defines:","o":["Materiality","Predication","Probable cause","Reasonable doubt"],"a":1,"e":"<strong>Predication</strong> is required before any examination begins. Without it, an inquiry is an improper 'fishing expedition.'"},"s2q4":{"sec":"s2","t":"When interviewing in a fraud examination, you should generally move:","o":["From most culpable to least culpable","From least culpable to most culpable","Randomly","Only interview the suspect"],"a":1,"e":"Interview <strong>least-culpable to most-culpable</strong>, and proceed from the general to the specific, so you reach the prime suspect armed with evidence."},"s2q5":{"sec":"s2","t":"The four common-law elements of fraud are a material false statement, knowledge of falsity, reliance, and:","o":["Intent to repay","Damages","A written contract","A government victim"],"a":1,"e":"The fourth element is <strong>damages</strong> — the victim suffered loss from relying on the material false statement made knowingly."},"s2q6":{"sec":"s2","t":"Which burden of proof applies in a criminal fraud prosecution?","o":["Preponderance of the evidence","Clear and convincing evidence","Beyond a reasonable doubt","Probable cause"],"a":2,"e":"Criminal cases require proof <strong>beyond a reasonable doubt</strong> — the highest standard. Civil cases use preponderance ('more likely than not')."},"s2q7":{"sec":"s2","t":"A civil fraud plaintiff must generally prove the case by:","o":["Beyond a reasonable doubt","Preponderance of the evidence","Clear and convincing in all cases","Probable cause"],"a":1,"e":"Most civil fraud actions use the <strong>preponderance of the evidence</strong> standard (more likely than not). Some specific civil fraud claims require clear and convincing — but preponderance is the general rule."},"s2q8":{"sec":"s2","t":"Which U.S. statute provides whistleblower protection and requires CEO/CFO certification of financial reports?","o":["RICO","Sarbanes-Oxley Act","FCPA","False Claims Act"],"a":1,"e":"<strong>Sarbanes-Oxley (SOX)</strong> mandates executive certification, strengthens governance, protects whistleblowers, and penalizes document destruction."},"s2q9":{"sec":"s2","t":"In most private-sector internal investigations, constitutional protections like the 5th Amendment:","o":["Fully apply to the employer","Primarily restrain government action, not private employers","Prohibit all interviews","Require Miranda warnings"],"a":1,"e":"Constitutional criminal protections generally restrain <strong>government</strong> action. Private employers have broader latitude, though employment law, contracts, and policies still apply."},"s2q10":{"sec":"s2","t":"Fingerprints found at a scene that require an inference to connect a suspect are an example of:","o":["Direct evidence","Circumstantial evidence","Hearsay","Demonstrative evidence"],"a":1,"e":"<strong>Circumstantial evidence</strong> requires an inference. Most fraud cases are built largely on valid circumstantial evidence. Direct evidence (an eyewitness) proves a fact without inference."},"s2q11":{"sec":"s2","t":"An unbroken record of who handled evidence and when is called:","o":["The work-product doctrine","Chain of custody","Predication","Materiality"],"a":1,"e":"<strong>Chain of custody</strong> documents every transfer and handler. A gap can render evidence inadmissible — a frequently tested point."},"s2q12":{"sec":"s2","t":"In digital forensics, you should analyze:","o":["The original device directly","A verified forensic image (copy), never the original","Only printed screenshots","The device after a factory reset"],"a":1,"e":"Always work on a <strong>verified forensic image</strong> using write-blockers; never alter the original. This preserves integrity and admissibility."},"s2q13":{"sec":"s2","t":"Matching hash values (e.g., SHA) before and after imaging a drive demonstrate that:","o":["The drive is encrypted","The forensic copy is identical to the original and unaltered","The suspect is guilty","The data is privileged"],"a":1,"e":"A matching <strong>hash value</strong> proves the image is bit-for-bit identical to the source and has not been altered — establishing integrity for court."},"s2q14":{"sec":"s2","t":"When collecting documentary evidence, the examiner should preferably obtain:","o":["Photocopies only","Originals where possible, documenting any exceptions","Summaries written by the suspect","Verbal descriptions"],"a":1,"e":"Obtain <strong>originals where possible</strong>; if only copies are available, document why. Preserve the document for forensic testing (ink, paper, indented writing)."},"s2q15":{"sec":"s2","t":"The correct general order of interview question types is:","o":["Admission-seeking → introductory → closing","Introductory → informational → closing → assessment → admission-seeking","Assessment → admission-seeking → informational","Closing → introductory → informational"],"a":1,"e":"<strong>Introductory → Informational → Closing → Assessment → Admission-seeking.</strong> Assessment and admission-seeking are used only when warranted."},"s2q16":{"sec":"s2","t":"An admission-seeking interview should be conducted only when:","o":["The subject requests it","There is reasonable certainty of the subject's guilt","At the start of every examination","The auditor is unavailable"],"a":1,"e":"Admission-seeking interviews require <strong>reasonable certainty of guilt</strong> and should be private. They are never the opening move."},"s2q17":{"sec":"s2","t":"A question that contains its own answer ('You were there that night, weren't you?') is a:","o":["Open question","Leading question","Assessment question","Double-negative question"],"a":1,"e":"A <strong>leading question</strong> suggests the answer and is used mainly to confirm known facts. Open questions invite a narrative."},"s2q18":{"sec":"s2","t":"In an admission-seeking interview, offering two incriminating choices ('Did you plan it, or did it just happen?') is the:","o":["Benchmark admission","Alternative question","Direct accusation","Rationalization"],"a":1,"e":"The <strong>alternative question</strong> presents two choices that both admit guilt, one more face-saving, to move the subject toward confession."},"s2q19":{"sec":"s2","t":"When a subject begins to issue a denial during an admission-seeking interview, the interviewer should:","o":["Let the denial be fully stated and recorded","Interrupt and prevent the denial from hardening","End the interview","Promise leniency"],"a":1,"e":"Skilled interviewers <strong>interrupt denials</strong> before they entrench, because a firmly stated denial is psychologically harder for the subject to retract."},"s2q20":{"sec":"s2","t":"A valid signed confession statement should:","o":["Be written by the examiner in legal language","Be in the subject's own words and acknowledge voluntariness","Promise no prosecution","Omit dollar amounts"],"a":1,"e":"A signed statement should be in the <strong>subject's own words</strong>, contain the key elements (who/what/when/how, intent, approximate amounts) and an acknowledgment that it was given voluntarily. Never promise leniency you can't deliver."},"s2q21":{"sec":"s2","t":"Which indirect method computes: asset increases + living expenses − known income = likely illicit funds?","o":["Bank deposits method","Net worth method","Expenditures method","Benford's Law"],"a":1,"e":"The <strong>net worth method</strong> infers unreported/illicit income from an unexplained increase in net worth plus living expenses, less funds from known legitimate sources."},"s2q22":{"sec":"s2","t":"Benford's Law is appropriately applied to:","o":["Telephone numbers","Sequential invoice ID numbers","Naturally occurring amounts such as payment/invoice values","Employee ID numbers"],"a":2,"e":"Benford's Law applies to <strong>natural numbers</strong> (amounts arising from underlying processes, like payment values), not to assigned/sequential numbers (phone, account, ID)."},"s2q23":{"sec":"s2","t":"Under Benford's Law, the leading digit 1 is expected to appear approximately:","o":["11.1% of the time","30.1% of the time","4.6% of the time","50% of the time"],"a":1,"e":"Leading digit 1 appears about <strong>30.1%</strong> of the time, decreasing to ~4.6% for 9. Large deviations from this distribution can flag manipulation."},"s2q24":{"sec":"s2","t":"In testimony, a fraud examiner should generally NOT:","o":["State findings within their expertise","Express an opinion on the defendant's legal guilt or innocence","Explain methodology","Identify documents"],"a":1,"e":"The examiner must <strong>not opine on legal guilt or innocence</strong> — that's for the trier of fact. Offer findings and opinions only within professional expertise."},"s2q25":{"sec":"s2","t":"The key difference between a lay witness and an expert witness is that an expert:","o":["Cannot be cross-examined","May offer opinions within their area of expertise","Is always paid by the court","Decides the verdict"],"a":1,"e":"An <strong>expert witness</strong>, once qualified, may give <strong>opinions</strong> within their expertise; a lay witness is generally limited to facts personally observed."},"s2q26":{"sec":"s2","t":"A common fraud-examination report mistake is:","o":["Including supporting exhibits","Stating legal conclusions or opinions on guilt","Describing the scope","Being timely"],"a":1,"e":"Reports must avoid <strong>legal conclusions and opinions on guilt</strong>, editorializing, and omission of exculpatory evidence. Report facts impartially; the report must withstand court scrutiny."},"s2q27":{"sec":"s2","t":"Civil and criminal cases arising from the same fraud proceeding at the same time are called:","o":["Double jeopardy","Parallel proceedings","Alternative dispute resolution","Discovery"],"a":1,"e":"<strong>Parallel proceedings</strong> run civil and criminal matters together; they require careful management (self-incrimination, discovery conflicts)."},"s2q28":{"sec":"s2","t":"You may NOT properly begin an admission-seeking interview without:","o":["A signed contract","Adequate predication and reasonable certainty of guilt","A court order","The suspect's lawyer present"],"a":1,"e":"Admission-seeking requires <strong>predication</strong> plus <strong>reasonable certainty of guilt</strong>. Starting without these violates examination standards."},"s2q29":{"sec":"s2","t":"'More likely than not' describes which standard, used in civil fraud cases?","o":["Beyond a reasonable doubt","Clear and convincing","Preponderance of the evidence","Probable cause"],"a":2,"e":"<strong>Preponderance of the evidence</strong> = 'more likely than not' (>50%), the general civil standard, lower than criminal 'beyond a reasonable doubt.'"},"s2q30":{"sec":"s2","t":"To preserve attorney-client privilege over an internal investigation, the work is best:","o":["Published widely","Conducted at the direction of legal counsel","Done without any documentation","Shared with the suspect"],"a":1,"e":"Running the investigation <strong>under counsel's direction</strong> helps preserve attorney-client privilege and work-product protection over investigative materials."},"s3q1":{"sec":"s3","t":"The three legs of the Fraud Triangle are pressure, opportunity, and:","o"
